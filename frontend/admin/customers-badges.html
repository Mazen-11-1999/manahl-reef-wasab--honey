<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العملاء والشارات | لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-gold: #f4c025;
            --cream-gold: #fff4d1;
            --velvet-brown: #1a1608;
            --deep-brown: #2d2612;
            --gold-20: rgba(244, 192, 37, 0.20);
            --success: #51cf66;
            --danger: #ff6b6b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, var(--velvet-brown), #221e10);
            color: var(--cream-gold);
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            padding-bottom: 90px;
        }
        header {
            background: linear-gradient(145deg, var(--deep-brown), var(--velvet-brown));
            padding: 20px 15px;
            border-bottom: 2px solid var(--royal-gold);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .header-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .back-button {
            background: rgba(212,175,55,0.1);
            border: 1px solid var(--gold-20);
            color: var(--royal-gold);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .back-button:hover { background: var(--royal-gold); color: var(--velvet-brown); transform: scale(1.05); }
        .header-title {
            color: var(--royal-gold);
            font-size: 1.4rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 24px 15px; }
        .card {
            background: linear-gradient(145deg, var(--deep-brown), var(--velvet-brown));
            border: 1px solid var(--gold-20);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .card h2 {
            color: var(--royal-gold);
            font-size: 1.2rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 10px; text-align: right; border-bottom: 1px solid var(--gold-20); }
        th { color: var(--royal-gold); font-weight: 600; }
        td { color: var(--cream-gold); }
        tr:hover td { background: rgba(244,192,37,0.05); }
        .badge-select {
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid var(--gold-20);
            background: rgba(0,0,0,0.3);
            color: var(--cream-gold);
            font-family: inherit;
            min-width: 160px;
            cursor: pointer;
        }
        .badge-select:focus { outline: none; border-color: var(--royal-gold); }
        .badge-pill {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .badge-pill.none { background: rgba(136,136,136,0.3); color: #aaa; }
        .badge-pill.premium { background: rgba(81,207,102,0.25); color: var(--success); }
        .badge-pill.vip { background: linear-gradient(135deg, var(--royal-gold), #d4af37); color: var(--velvet-brown); }
        .loading { text-align: center; padding: 40px; color: var(--royal-gold); }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            transition: transform 0.3s, opacity 0.3s;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast.success { background: var(--success); color: #1a1a1a; }
        .toast.error { background: var(--danger); color: #fff; }
        .search-box {
            width: 100%;
            max-width: 300px;
            padding: 10px 16px;
            margin-bottom: 16px;
            border: 1px solid var(--gold-20);
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            color: var(--cream-gold);
            font-family: inherit;
        }
        .search-box::placeholder { color: #888; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="dashboard.html" class="back-button" title="العودة للوحة التحكم"><i class="fas fa-arrow-right"></i></a>
            <h1 class="header-title"><i class="fas fa-users-cog"></i> العملاء والشارات</h1>
        </div>
    </header>
    <div class="container">
        <div class="card">
            <h2><i class="fas fa-crown"></i> إدارة الشارات</h2>
            <p style="color: var(--cream-gold); margin-bottom: 16px; font-size: 0.95rem;">
                يمكنك تعيين شارة لأي عميل حسب عدد مشترياته أو تقديرك. الشارة تظهر في ملفه الشخصي.
            </p>
            <input type="text" class="search-box" id="searchCustomers" placeholder="بحث بالاسم أو الهاتف أو البريد...">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>العميل</th>
                            <th>الهاتف</th>
                            <th>عدد الطلبات</th>
                            <th>الشارة الحالية</th>
                            <th>تغيير الشارة</th>
                        </tr>
                    </thead>
                    <tbody id="customersTableBody">
                        <tr><td colspan="5" class="loading"><i class="fas fa-spinner fa-spin"></i> جاري تحميل العملاء...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div id="toast" class="toast"></div>

    <script src="../js/api.js"></script>
    <script>
        (function() {
            const tbody = document.getElementById('customersTableBody');
            const searchInput = document.getElementById('searchCustomers');
            let allCustomers = [];

            function showToast(msg, type) {
                const el = document.getElementById('toast');
                el.textContent = msg;
                el.className = 'toast ' + (type || 'success');
                el.classList.add('show');
                setTimeout(function() { el.classList.remove('show'); }, 3000);
            }

            function badgeLabel(type) {
                if (type === 'vip') return 'VIP مناحل ريف وصاب';
                if (type === 'premium') return 'عميل مميز';
                return 'بدون شارة';
            }

            function renderCustomers(customers) {
                if (!customers || customers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:#888;">لا يوجد عملاء</td></tr>';
                    return;
                }
                tbody.innerHTML = customers.map(function(c) {
                    const name = (c.user && c.user.profile && (c.user.profile.firstName || c.user.profile.lastName))
                        ? ((c.user.profile.firstName || '') + ' ' + (c.user.profile.lastName || '')).trim() || c.user.username
                        : (c.profile && (c.profile.firstName || c.profile.lastName))
                            ? ((c.profile.firstName || '') + ' ' + (c.profile.lastName || '')).trim()
                            : (c.user && c.user.username) ? c.user.username : c.email || c.phone || '—';
                    const badgeType = (c.user && c.user.badgeType) ? c.user.badgeType : 'none';
                    const orderCount = c.orderCount !== undefined ? c.orderCount : 0;
                    return '<tr data-id="' + c._id + '">' +
                        '<td>' + (name || '—') + '</td>' +
                        '<td>' + (c.phone || '—') + '</td>' +
                        '<td>' + orderCount + ' طلب</td>' +
                        '<td><span class="badge-pill ' + badgeType + '">' + badgeLabel(badgeType) + '</span></td>' +
                        '<td><select class="badge-select" data-customer-id="' + c._id + '">' +
                        '<option value="none"' + (badgeType === 'none' ? ' selected' : '') + '>بدون شارة</option>' +
                        '<option value="premium"' + (badgeType === 'premium' ? ' selected' : '') + '>عميل مميز</option>' +
                        '<option value="vip"' + (badgeType === 'vip' ? ' selected' : '') + '>VIP مناحل ريف وصاب</option>' +
                        '</select></td></tr>';
                }).join('');

                tbody.querySelectorAll('.badge-select').forEach(function(sel) {
                    sel.addEventListener('change', function() {
                        const customerId = this.getAttribute('data-customer-id');
                        const badgeType = this.value;
                        if (!window.API || !window.API.customers || !window.API.customers.updateBadge) {
                            showToast('خطأ: API غير متاح', 'error');
                            return;
                        }
                        window.API.customers.updateBadge(customerId, badgeType)
                            .then(function() {
                                showToast('تم تحديث الشارة بنجاح', 'success');
                                var row = tbody.querySelector('tr[data-id="' + customerId + '"]');
                                if (row) {
                                    var badgeCell = row.querySelector('td:nth-child(4)');
                                    if (badgeCell) {
                                        badgeCell.innerHTML = '<span class="badge-pill ' + badgeType + '">' + badgeLabel(badgeType) + '</span>';
                                    }
                                }
                            })
                            .catch(function(err) {
                                showToast(err.message || 'فشل تحديث الشارة', 'error');
                                loadCustomers();
                            });
                    });
                });
            }

            function loadCustomers() {
                var token = window.API ? window.API.getAuthToken() : null;
                if (!token) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:#ff6b6b;">يرجى تسجيل الدخول للوحة التحكم أولاً.</td></tr>';
                    return;
                }
                tbody.innerHTML = '<tr><td colspan="5" class="loading"><i class="fas fa-spinner fa-spin"></i> جاري تحميل العملاء...</td></tr>';
                window.API.customers.getAll({ limit: 500 }).then(function(res) {
                    if (res.success && res.customers) {
                        allCustomers = res.customers;
                        renderCustomers(allCustomers);
                    } else {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:#888;">لا يوجد عملاء</td></tr>';
                    }
                }).catch(function(err) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:#ff6b6b;">' + (err.message || 'فشل تحميل العملاء') + '</td></tr>';
                });
            }

            searchInput.addEventListener('input', function() {
                var q = (this.value || '').trim().toLowerCase();
                if (!q) {
                    renderCustomers(allCustomers);
                    return;
                }
                var filtered = allCustomers.filter(function(c) {
                    var name = (c.user && c.user.profile && (c.user.profile.firstName || c.user.profile.lastName))
                        ? ((c.user.profile.firstName || '') + ' ' + (c.user.profile.lastName || '')).trim()
                        : (c.user && c.user.username) ? c.user.username : (c.email || '') + (c.phone || '');
                    return (c.phone && c.phone.indexOf(q) !== -1) ||
                           (c.email && c.email.indexOf(q) !== -1) ||
                           (name && name.toLowerCase().indexOf(q) !== -1);
                });
                renderCustomers(filtered);
            });

            document.addEventListener('DOMContentLoaded', loadCustomers);
        })();
    </script>
</body>
</html>
