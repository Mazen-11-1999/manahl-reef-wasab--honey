<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيف السندات | مناحل ريف وصاب</title>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Enhanced Arabic Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cairo:wght@200;300;400;500;600;700;800;900;1000&family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #120a00;
            --bg-secondary: #1a0f00;
            --bg-card: #1d1102;
            --bg-accent: #2a1804;
            --gold-primary: #d4af37;
            --gold-light: #f3cf7a;
            --text-primary: #ffffff;
            --text-secondary: #e0c097;
            --text-muted: #888;
            --text-dim: #555;
            --border-gold: rgba(212, 175, 55, 0.3);
            --shadow-gold: rgba(212, 175, 55, 0.3);
            --success: #00ff00;
            --danger: #ff4444;
            --warning: #ff9800;
            --info: #2196f3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
            font-family: 'Tajawal', sans-serif;
            color: var(--text-primary);
        }

        .shipping-archive {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* الهيدر */
        .archive-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-gold);
            position: relative;
        }

        .back-button {
            position: absolute;
            right: 0;
            top: 0;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--border-gold);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--gold-primary);
            text-decoration: none;
            font-size: 1.2rem;
        }

        .back-button:hover {
            background: var(--gold-primary);
            color: var(--bg-primary);
            transform: scale(1.1);
            box-shadow: 0 5px 15px var(--shadow-gold);
        }

        .archive-title {
            color: var(--gold-primary);
            font-size: 1.8rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .archive-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* الفلاتر والبحث */
        .filters-section {
            background: linear-gradient(145deg, var(--bg-card), var(--bg-accent));
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border-gold);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-label {
            color: var(--gold-primary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .filter-input {
            padding: 10px;
            background: var(--bg-primary);
            border: 1px solid #444;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .filter-input:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 5px var(--shadow-gold);
        }

        .filter-select {
            padding: 10px;
            background: var(--bg-primary);
            border: 1px solid #444;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .filter-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-search {
            background: var(--gold-primary);
            color: var(--bg-primary);
            font-weight: bold;
        }

        .btn-reset {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid #444;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* الإحصائيات */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(145deg, var(--bg-card), var(--bg-accent));
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--border-gold);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold-primary);
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* شبكة السندات */
        .receipts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .receipt-card {
            background: linear-gradient(145deg, var(--bg-card), var(--bg-accent));
            border-radius: 12px;
            padding: 10px;
            border: 1px solid #333;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .receipt-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border-color: var(--gold-primary);
        }

        .receipt-image-container {
            position: relative;
            width: 100%;
            padding-bottom: 140%;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .receipt-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(50%);
            transition: all 0.3s ease;
        }

        .receipt-card:hover .receipt-image {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        .receipt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .receipt-card:hover .receipt-overlay {
            opacity: 1;
        }

        .overlay-actions {
            display: flex;
            gap: 10px;
        }

        .overlay-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-view {
            background: var(--info);
            color: white;
        }

        .btn-download {
            background: var(--success);
            color: white;
        }

        .btn-delete {
            background: var(--danger);
            color: white;
        }

        .receipt-info {
            text-align: center;
        }

        .receipt-customer {
            color: var(--text-primary);
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .receipt-office {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-bottom: 5px;
        }

        .receipt-date {
            color: var(--gold-primary);
            font-size: 0.7rem;
            font-weight: bold;
        }

        .receipt-status {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            font-size: 0.6rem;
            font-weight: bold;
        }

        .status-active {
            background: var(--success);
            color: white;
        }

        .status-completed {
            background: var(--info);
            color: white;
        }

        /* عرض المودال */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .modal-image {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .modal-info {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--gold-primary);
            color: var(--bg-primary);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 1001;
        }

        /* تأثيرات الحركة */
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-up {
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* تصميم متجاوب */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .archive-title {
                font-size: 1.5rem;
            }

            .filters-grid {
                grid-template-columns: 1fr;
            }

            .receipts-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .archive-title {
                font-size: 1.3rem;
            }

            .receipts-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .stats-row {
                grid-template-columns: 1fr;
            }
        }

        /* تأثيرات التحميل */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--text-muted);
            border-radius: 50%;
            border-top-color: var(--gold-primary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* الإشعارات */
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--gold-primary);
            border-radius: 10px;
            padding: 15px;
            color: var(--text-primary);
            z-index: 1000;
            transform: translateY(-100px);
            transition: transform 0.3s ease;
            text-align: center;
        }

        .notification.show {
            transform: translateY(0);
        }

        .notification.success {
            border-color: var(--success);
            background: linear-gradient(145deg, rgba(0, 255, 0, 0.1), rgba(0, 200, 0, 0.05));
        }

        .notification.error {
            border-color: var(--danger);
            background: linear-gradient(145deg, rgba(255, 68, 68, 0.1), rgba(255, 102, 102, 0.05));
        }
    </style>
</head>

<body>

    <div class="shipping-archive">

        <!-- الهيدر -->
        <div class="archive-header fade-in">
            <a href="dashboard.html" class="back-button" title="العودة للوحة التحكم">
                <i class="fas fa-arrow-right"></i>
            </a>
            <h1 class="archive-title">
                <i class="fas fa-shipping-fast"></i>
                <span>أرشيف سندات الإرسال</span>
            </h1>
            <p class="archive-subtitle">جميع سندات الشحن المحفوظة والمنظمة</p>
        </div>

        <!-- الفلاتر والبحث -->
        <div class="filters-section fade-in" style="animation-delay: 0.1s">
            <div class="filters-grid">
                <div class="filter-group">
                    <label class="filter-label">البحث عن عميل</label>
                    <input type="text" class="filter-input" id="searchCustomer" placeholder="اسم العميل...">
                </div>

                <div class="filter-group">
                    <label class="filter-label">مكتب الشحن</label>
                    <select class="filter-select" id="filterOffice">
                        <option value="">جميع المكاتب</option>
                        <option value="النور">النور للنقل</option>
                        <option value="السرعة">السرعة للنقل</option>
                        <option value="البريد">البريد اليمني</option>
                        <option value="أخرى">أخرى</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label">من تاريخ</label>
                    <input type="date" class="filter-input" id="filterDateFrom">
                </div>

                <div class="filter-group">
                    <label class="filter-label">إلى تاريخ</label>
                    <input type="date" class="filter-input" id="filterDateTo">
                </div>
            </div>

            <div class="filter-actions">
                <button class="filter-btn btn-search" onclick="applyFilters()">
                    🔍 بحث وتصفية
                </button>
                <button class="filter-btn btn-reset" onclick="resetFilters()">
                    🔄 إعادة تعيين
                </button>
            </div>
        </div>

        <!-- الإحصائيات -->
        <div class="stats-row fade-in" style="animation-delay: 0.2s">
            <div class="stat-card">
                <div class="stat-value" id="totalReceipts">0</div>
                <div class="stat-label">إجمالي السندات</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="thisMonth">0</div>
                <div class="stat-label">هذا الشهر</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeOrders">0</div>
                <div class="stat-label">طلبات نشطة</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completedOrders">0</div>
                <div class="stat-label">مكتملة</div>
            </div>
        </div>

        <!-- شبكة السندات -->
        <div class="receipts-grid" id="receiptsGrid">
            <!-- السندات ستتم إضافتها ديناميكياً -->
        </div>

    </div>

    <!-- مودال عرض السند -->
    <div class="modal" id="receiptModal" onclick="closeModal(event)">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">✕</button>
            <img class="modal-image" id="modalImage" src="" alt="صورة السند">
            <div class="modal-info">
                <h3 id="modalTitle">معلومات السند</h3>
                <p id="modalCustomer"></p>
                <p id="modalOffice"></p>
                <p id="modalDate"></p>
                <p id="modalStatus"></p>
            </div>
        </div>
    </div>

    <!-- الإشعارات -->
    <div class="notification" id="notification"></div>

    <!-- API Script -->
    <script src="../js/api.js"></script>

    <script>
        // بيانات السندات
        let receiptsData = [];
        let filteredReceipts = [];

        // تحميل بيانات السندات من API
        async function loadReceiptsData() {
            try {
                if (!window.API || !window.API.orders) {
                    console.warn('API not available');
                    return;
                }

                // جلب جميع الطلبات التي لديها سند شحن
                const response = await window.API.orders.getAll({ limit: 1000 });
                const orders = response.data || response.orders || [];

                // تحويل الطلبات إلى سندات
                receiptsData = orders
                    .filter(order => order.shippingReceipt && order.shippingReceipt.url)
                    .map(order => ({
                        id: order._id,
                        orderId: order.orderId,
                        customer: order.customer?.name || 'غير محدد',
                        office: order.shipping?.office || 'غير محدد',
                        date: order.shippingReceipt.uploadedAt || order.createdAt,
                        status: order.status === 'completed' || order.status === 'delivered' ? 'completed' : 'active',
                        image: order.shippingReceipt.url,
                        order: order
                    }));

                filteredReceipts = [...receiptsData];
                updateReceiptsGrid();
                updateStats();
            } catch (error) {
                console.error('Error loading receipts:', error);
                showNotification('حدث خطأ في تحميل السندات', 'error');
            }
        }

        // تحديث شبكة السندات
        function updateReceiptsGrid() {
            const grid = document.getElementById('receiptsGrid');

            if (filteredReceipts.length === 0) {
                grid.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">
                    <div style="font-size: 3rem; margin-bottom: 10px;">📭</div>
                    <p>لا توجد سندات مطابقة للبحث</p>
                </div>
            `;
                return;
            }

            grid.innerHTML = filteredReceipts.map(receipt => {
                const date = new Date(receipt.date);
                const dateStr = date.toLocaleDateString('ar-SA');
                const statusClass = receipt.status === 'active' ? 'status-active' : 'status-completed';
                const statusText = receipt.status === 'active' ? 'نشط' : 'مكتمل';

                return `
                <div class="receipt-card fade-in" onclick="viewReceipt('${receipt.id}')">
                    <div class="receipt-status ${statusClass}">${statusText}</div>
                    
                    <div class="receipt-image-container">
                        <img class="receipt-image" src="${receipt.image}" alt="سند ${receipt.orderId}">
                        <div class="receipt-overlay">
                            <div class="overlay-actions">
                                <button class="overlay-btn btn-view" onclick="event.stopPropagation(); viewReceipt('${receipt.id}')">
                                    👁️ عرض
                                </button>
                                <button class="overlay-btn btn-download" onclick="event.stopPropagation(); downloadReceipt('${receipt.id}')">
                                    📥 تحميل
                                </button>
                                <button class="overlay-btn btn-delete" onclick="event.stopPropagation(); deleteReceipt('${receipt.id}')">
                                    🗑️ حذف
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="receipt-info">
                        <div class="receipt-customer">${receipt.customer}</div>
                        <div class="receipt-office">${receipt.office}</div>
                        <div class="receipt-date">${dateStr}</div>
                    </div>
                </div>
            `;
            }).join('');
        }

        // تحديث الإحصائيات
        function updateStats() {
            const total = receiptsData.length;
            const thisMonth = receiptsData.filter(receipt => {
                const receiptDate = new Date(receipt.date);
                const currentDate = new Date();
                return receiptDate.getMonth() === currentDate.getMonth() &&
                    receiptDate.getFullYear() === currentDate.getFullYear();
            }).length;
            const active = receiptsData.filter(r => r.status === 'active').length;
            const completed = receiptsData.filter(r => r.status === 'completed').length;

            document.getElementById('totalReceipts').textContent = total;
            document.getElementById('thisMonth').textContent = thisMonth;
            document.getElementById('activeOrders').textContent = active;
            document.getElementById('completedOrders').textContent = completed;
        }

        // تطبيق الفلاتر
        function applyFilters() {
            const searchTerm = document.getElementById('searchCustomer').value.toLowerCase();
            const officeFilter = document.getElementById('filterOffice').value;
            const dateFrom = document.getElementById('filterDateFrom').value;
            const dateTo = document.getElementById('filterDateTo').value;

            filteredReceipts = receiptsData.filter(receipt => {
                // فلتر البحث
                if (searchTerm && !receipt.customer.toLowerCase().includes(searchTerm)) {
                    return false;
                }

                // فلتر المكتب
                if (officeFilter && receipt.office !== officeFilter) {
                    return false;
                }

                // فلتر التاريخ
                const receiptDate = new Date(receipt.date);
                if (dateFrom && receiptDate < new Date(dateFrom)) {
                    return false;
                }
                if (dateTo && receiptDate > new Date(dateTo)) {
                    return false;
                }

                return true;
            });

            updateReceiptsGrid();
            showNotification(`تم العثور على ${filteredReceipts.length} سند`, 'success');
        }

        // إعادة تعيين الفلاتر
        function resetFilters() {
            document.getElementById('searchCustomer').value = '';
            document.getElementById('filterOffice').value = '';
            document.getElementById('filterDateFrom').value = '';
            document.getElementById('filterDateTo').value = '';

            filteredReceipts = [...receiptsData];
            updateReceiptsGrid();
            showNotification('تم إعادة تعيين الفلاتر', 'success');
        }

        // عرض السند في المودال
        function viewReceipt(receiptId) {
            const receipt = receiptsData.find(r => r.id === receiptId);
            if (!receipt) return;

            const modal = document.getElementById('receiptModal');
            const modalImage = document.getElementById('modalImage');
            const modalTitle = document.getElementById('modalTitle');
            const modalCustomer = document.getElementById('modalCustomer');
            const modalOffice = document.getElementById('modalOffice');
            const modalDate = document.getElementById('modalDate');
            const modalStatus = document.getElementById('modalStatus');

            modalImage.src = receipt.image;
            modalTitle.textContent = `سند ${receipt.orderId}`;
            modalCustomer.textContent = `العميل: ${receipt.customer}`;
            modalOffice.textContent = `مكتب الشحن: ${receipt.office}`;
            modalDate.textContent = `التاريخ: ${new Date(receipt.date).toLocaleDateString('ar-SA')}`;
            modalStatus.textContent = `الحالة: ${receipt.status === 'active' ? 'نشط' : 'مكتمل'}`;

            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        // إغلاق المودال
        function closeModal(event) {
            if (event && event.target !== event.currentTarget) return;

            const modal = document.getElementById('receiptModal');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // تحميل السند
        function downloadReceipt(receiptId) {
            const receipt = receiptsData.find(r => r.id === receiptId);
            if (!receipt) return;

            // إنشاء رابط تحميل
            const link = document.createElement('a');
            link.href = receipt.image;
            link.download = `سند_${receipt.orderId}.jpg`;
            link.target = '_blank';
            link.click();

            showNotification('جاري تحميل السند...', 'success');
        }

        // حذف السند (لا يمكن حذف السند من الطلب، فقط يمكن حذف الطلب نفسه)
        function deleteReceipt(receiptId) {
            showNotification('لا يمكن حذف السند. السند مرتبط بالطلب ولا يمكن حذفه منفصلاً.', 'warning');
        }

        // عرض الإشعارات
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            const iconMap = {
                success: '✅',
                error: '❌',
                warning: '⚠️'
            };

            notification.innerHTML = `<span style="margin-left: 8px;">${iconMap[type]}</span> ${message}`;
            notification.className = `notification ${type}`;

            // عرض الإشعار
            setTimeout(() => {
                notification.classList.add('show');
            }, 100);

            // إخفاء الإشعار بعد 3 ثواني
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // إعادة تحميل السندات بعد إضافة سند جديد
        function refreshReceipts() {
            loadReceiptsData();
        }

            showNotification('تم إضافة السند الجديد للأرشيف', 'success');
        }

        // تهيئة الصفحة
        document.addEventListener('DOMContentLoaded', async function () {
            // تحميل API إذا لم يكن متاحاً
            if (!window.API) {
                const script = document.createElement('script');
                script.src = '../js/api.js';
                document.head.appendChild(script);
                
                await new Promise(resolve => {
                    script.onload = resolve;
                    setTimeout(resolve, 2000);
                });
            }
            
            await loadReceiptsData();

            // إضافة تأثيرات التمرير
            const elements = document.querySelectorAll('.fade-in');
            elements.forEach((element, index) => {
                element.style.animationDelay = `${index * 0.1}s`;
            });

            // البحث المباشر
            document.getElementById('searchCustomer').addEventListener('input', function () {
                if (this.value.length > 2 || this.value.length === 0) {
                    applyFilters();
                }
            });

            // معالجة تغيير حجم النافذة
            window.addEventListener('resize', function () {
                // إعادة حساب الأبعاد إذا لزم الأمر
                const archive = document.querySelector('.shipping-archive');
                if (window.innerWidth > 1200) {
                    archive.style.maxWidth = '1200px';
                    archive.style.margin = '0 auto';
                } else {
                    archive.style.maxWidth = '100%';
                    archive.style.margin = '0';
                }
            });

            // معالجة زر Escape للمودال
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });
        });

        // جعل الدالة متاحة عالمياً للاستخدام من صفحات أخرى
        window.addNewReceipt = addNewReceipt;
    </script>
