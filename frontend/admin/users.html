<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صندوق الإشعارات | ريف وصاب</title>
    <style>
        :root {
            --bg-primary: #120a00;
            --bg-secondary: #1a0f00;
            --bg-card: #1d1102;
            --bg-accent: #2a1804;
            --bg-read: #171008;
            --gold-primary: #d4af37;
            --gold-light: #f3cf7a;
            --gold-dark: #aa8c2c;
            --text-primary: #e0c097;
            --text-secondary: #f3cf7a;
            --text-white: #ffffff;
            --text-muted: #888;
            --text-dim: #555;
            --border-gold: rgba(212, 175, 55, 0.2);
            --shadow-gold: rgba(212, 175, 55, 0.3);
            --glow-gold: rgba(212, 175, 55, 0.8);
            --success: #51cf66;
            --danger: #ff6b6b;
            --warning: #ffd43b;
            --info: #74c0fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
            color: var(--text-primary);
            font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, var(--gold-primary) 1px, transparent 1px),
                radial-gradient(circle at 80% 20%, var(--gold-primary) 1px, transparent 1px),
                radial-gradient(circle at 40% 40%, var(--gold-primary) 1px, transparent 1px);
            background-size: 200px 200px, 150px 150px, 100px 100px;
            opacity: 0.03;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            50% {
                transform: translate(-10px, -10px) rotate(180deg);
            }
        }

        header {
            background: linear-gradient(145deg, var(--bg-accent), var(--bg-card));
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid var(--gold-primary);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            color: var(--gold-primary);
            font-size: 1.3rem;
            font-weight: bold;
            text-shadow: 0 0 10px var(--shadow-gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .notifications-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 20px;
            background: linear-gradient(145deg, var(--bg-card), var(--bg-accent));
            border-radius: 20px;
            border: 1px solid var(--border-gold);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .notifications-title {
            color: var(--gold-primary);
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .clear-all-btn {
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 8px 15px;
            border: 1px solid var(--border-gold);
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .clear-all-btn:hover {
            color: var(--gold-primary);
            border-color: var(--gold-primary);
            transform: translateY(-2px);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-item {
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            transform: translateY(-3px);
            border-color: var(--gold-primary);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .stat-icon {
            font-size: 1.5rem;
            color: var(--gold-primary);
            margin-bottom: 5px;
        }

        .stat-value {
            color: var(--text-white);
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding: 5px;
            background: var(--bg-card);
            border-radius: 15px;
            border: 1px solid var(--border-gold);
        }

        .filter-tab {
            flex: 1;
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .filter-tab:hover {
            color: var(--gold-primary);
            background: rgba(212, 175, 55, 0.1);
        }

        .filter-tab.active {
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-light));
            color: var(--bg-primary);
            box-shadow: 0 3px 10px var(--shadow-gold);
        }

        .notifications-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .notification-item {
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            border-radius: 15px;
            padding: 20px;
            position: relative;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .notification-item.unread {
            border-color: var(--gold-primary);
            box-shadow: 0 0 20px var(--shadow-gold);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 0 20px var(--shadow-gold);
            }

            50% {
                box-shadow: 0 0 30px var(--glow-gold);
            }
        }

        .notification-item.unread::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            width: 12px;
            height: 12px;
            background: var(--gold-primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--glow-gold);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }
        }

        .notification-item.read {
            opacity: 0.8;
            background: var(--bg-read);
            border-color: rgba(212, 175, 55, 0.1);
        }

        .notification-item:hover {
            transform: translateX(-5px);
            border-color: var(--gold-primary);
        }

        .notification-content {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .notification-icon {
            font-size: 2rem;
            color: var(--gold-primary);
            min-width: 50px;
            text-align: center;
        }

        .notification-details {
            flex: 1;
        }

        .notification-title {
            color: var(--text-white);
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .notification-message {
            color: var(--text-primary);
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .notification-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .notification-time {
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .notification-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 5px 10px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--border-gold);
            border-radius: 15px;
            color: var(--gold-primary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--gold-primary);
            color: var(--bg-primary);
            transform: translateY(-2px);
        }

        .notification-type {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 10px;
        }

        .type-promo {
            background: var(--warning);
            color: var(--bg-primary);
        }

        .type-order {
            background: var(--success);
            color: white;
        }

        .type-info {
            background: var(--info);
            color: white;
        }

        .type-alert {
            background: var(--danger);
            color: white;
        }

        .type-welcome {
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-light));
            color: var(--bg-primary);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 4rem;
            color: var(--border-gold);
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        .empty-message {
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .load-more {
            text-align: center;
            margin-top: 30px;
        }

        .load-more-btn {
            padding: 15px 30px;
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-light));
            border: none;
            border-radius: 25px;
            color: var(--bg-primary);
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px var(--shadow-gold);
        }

        .load-more-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--shadow-gold);
        }

        .floating-badge {
            position: fixed;
            top: 80px;
            left: 20px;
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-light));
            color: var(--bg-primary);
            padding: 10px 15px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 5px 20px var(--shadow-gold);
            z-index: 50;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px 10px;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .filter-tabs {
                flex-wrap: wrap;
            }

            .filter-tab {
                min-width: calc(50% - 5px);
            }

            .notifications-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .notification-content {
                gap: 10px;
            }

            .notification-icon {
                font-size: 1.5rem;
                min-width: 40px;
            }

            .notification-title {
                font-size: 1rem;
            }

            .notification-message {
                font-size: 0.85rem;
            }

            .floating-badge {
                top: auto;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
            }
        }

        @media (max-width: 480px) {
            .stats-bar {
                grid-template-columns: 1fr;
            }

            .filter-tab {
                min-width: 100%;
            }

            .notification-meta {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .notification-actions {
                width: 100%;
                justify-content: space-between;
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-up {
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <!-- API Integration -->
    <script src="../js/api.js"></script>

    <header>
        <div class="header-content">
            <a href="dashboard.html" class="back-button" title="العودة للوحة التحكم">
                <i class="fas fa-arrow-right"></i>
            </a>
            <h1 class="header-title">
                <i class="fas fa-users"></i>
                <span>إدارة المستخدمين</span>
            </h1>
        </div>
    </header>

    <div class="container">

        <!-- شارة الإشعارات غير المقروءة -->
        <div class="floating-badge" id="unreadBadge" style="display: none;">
            <i class="fas fa-bell"></i> <span id="unreadBadgeText">0 إشعارات جديدة</span>
        </div>

        <!-- شريط الإحصائيات -->
        <div class="stats-bar fade-in">
            <div class="stat-item">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">إجمالي المستخدمين</div>
            </div>
            <div class="stat-item">
                <div class="stat-icon"><i class="fas fa-user-check"></i></div>
                <div class="stat-value" id="activeCount">0</div>
                <div class="stat-label">نشطون</div>
            </div>
            <div class="stat-item">
                <div class="stat-icon"><i class="fas fa-crown"></i></div>
                <div class="stat-value" id="vipCount">0</div>
                <div class="stat-label">VIP</div>
            </div>
            <div class="stat-item">
                <div class="stat-icon"><i class="fas fa-user-tie"></i></div>
                <div class="stat-value" id="agentCount">0</div>
                <div class="stat-label">مناديب</div>
            </div>
        </div>

        <!-- رأس المستخدمين -->
        <div class="notifications-header fade-in">
            <h2 class="notifications-title">
                <i class="fas fa-users"></i>
                <span>قائمة المستخدمين</span>
            </h2>
            <button class="clear-all-btn" onclick="refreshUsers()">
                <i class="fas fa-sync-alt"></i> تحديث
            </button>
        </div>

        <!-- تبويبات التصفية -->
        <div class="filter-tabs fade-in">
            <button class="filter-tab active" onclick="filterUsers('all')">الكل</button>
            <button class="filter-tab" onclick="filterUsers('active')">نشطون</button>
            <button class="filter-tab" onclick="filterUsers('vip')">VIP</button>
            <button class="filter-tab" onclick="filterUsers('agents')">مناديب</button>
            <button class="filter-tab" onclick="filterUsers('new')">جدد</button>
        </div>

        <!-- قائمة المستخدمين -->
        <div class="notifications-list" id="usersList">
            <!-- سيتم ملؤه ديناميكياً -->
        </div>

        <!-- زر تحميل المزيد -->
        <div class="load-more">
            <button class="load-more-btn" onclick="loadMoreUsers()">
                <i class="fas fa-arrow-down"></i> تحميل المزيد
            </button>
        </div>

    </div>

    <script>
        // تحميل المستخدمين من API
        async function loadUsers() {
            try {
                if (!window.API || !window.API.customers) {
                    console.warn('API not available');
                    return;
                }
                
                const response = await window.API.customers.getAll({ limit: 50 });
                const users = response.data || response.customers || [];
                
                // تحديث الإحصائيات
                const total = users.length;
                const active = users.filter(u => u.status === 'active').length;
                const vip = users.filter(u => u.isVIP).length;
                const agents = users.filter(u => u.role === 'agent').length;
                
                document.getElementById('totalCount').textContent = total;
                document.getElementById('activeCount').textContent = active;
                document.getElementById('vipCount').textContent = vip;
                document.getElementById('agentCount').textContent = agents;
                
                // عرض المستخدمين
                displayUsers(users);
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }
        
        // عرض المستخدمين
        function displayUsers(users) {
            const list = document.getElementById('usersList');
            if (!list) return;
            
            if (users.length === 0) {
                list.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                        <i class="fas fa-users" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;"></i>
                        <p>لا يوجد مستخدمين</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = users.map(user => {
                const name = user.profile?.firstName && user.profile?.lastName 
                    ? `${user.profile.firstName} ${user.profile.lastName}`
                    : user.username || user.email || 'مستخدم';
                const phone = user.profile?.phone || user.phone || 'غير متوفر';
                const vipBadge = user.isVIP ? '<span class="vip-badge"><i class="fas fa-crown"></i> VIP</span>' : '';
                
                return `
                    <div class="notification-item ${!user.read ? 'unread' : ''}">
                        <div class="notification-icon">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="notification-content">
                            <div class="notification-title">${name} ${vipBadge}</div>
                            <div class="notification-message">${phone}</div>
                            <div class="notification-meta">
                                <span><i class="fas fa-envelope"></i> ${user.email || 'غير متوفر'}</span>
                                <span><i class="fas fa-calendar"></i> ${new Date(user.createdAt).toLocaleDateString('ar-YE')}</span>
                            </div>
                        </div>
                        <div class="notification-actions">
                            <button class="action-btn" onclick="viewUser('${user._id}')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // قائمة الإشعارات — تُملأ من API أو تبقى فارغة (لا بيانات وهمية)
        let notificationsData = [];

        let currentFilter = 'all';
        let displayedNotifications = 5;

        // تحميل الإشعارات (تعمل فقط إذا وُجد عنصر قائمة الإشعارات في الصفحة)
        function loadNotifications(filter = 'all', limit = 5) {
            const notificationsList = document.getElementById('notificationsList');
            if (!notificationsList) return;
            notificationsList.innerHTML = '';

            let filteredNotifications = notificationsData;

            if (filter === 'unread') {
                filteredNotifications = notificationsData.filter(n => !n.read);
            } else if (filter === 'promo') {
                filteredNotifications = notificationsData.filter(n => n.type === 'promo');
            } else if (filter === 'order') {
                filteredNotifications = notificationsData.filter(n => n.type === 'order');
            } else if (filter === 'info') {
                filteredNotifications = notificationsData.filter(n => n.type === 'info');
            }

            const notificationsToShow = filteredNotifications.slice(0, limit);

            if (notificationsToShow.length === 0) {
                notificationsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-title">لا توجد إشعارات</div>
                        <div class="empty-message">لم يتم العثور على إشعارات في هذه الفئة</div>
                    </div>
                `;
                return;
            }

            notificationsToShow.forEach((notification, index) => {
                const notificationItem = createNotificationElement(notification);
                notificationItem.style.animationDelay = `${index * 0.1}s`;
                notificationItem.classList.add('fade-in');
                notificationsList.appendChild(notificationItem);
            });

            updateStats();
        }

        // إنشاء عنصر الإشعار
        function createNotificationElement(notification) {
            const div = document.createElement('div');
            div.className = `notification-item ${notification.read ? 'read' : 'unread'}`;
            div.onclick = () => markAsRead(notification.id);

            const typeClass = `type-${notification.type}`;
            const typeText = getTypeText(notification.type);

            div.innerHTML = `
                <div class="notification-content">
                    <div class="notification-icon">${notification.icon}</div>
                    <div class="notification-details">
                        <h3 class="notification-title">
                            ${notification.title}
                            <span class="notification-type ${typeClass}">${typeText}</span>
                        </h3>
                        <p class="notification-message">${notification.message}</p>
                        <div class="notification-meta">
                            <span class="notification-time">🕐 ${notification.time}</span>
                            <div class="notification-actions">
                                <button class="action-btn" onclick="event.stopPropagation(); deleteNotification(${notification.id})">حذف</button>
                                <button class="action-btn" onclick="event.stopPropagation(); shareNotification(${notification.id})">مشاركة</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            return div;
        }

        // الحصول على نص النوع
        function getTypeText(type) {
            const types = {
                promo: 'عرض',
                order: 'طلب',
                info: 'معلومة',
                alert: 'تنبيه',
                welcome: 'ترحيب'
            };
            return types[type] || 'عام';
        }

        // تصفية الإشعارات
        function filterNotifications(filter) {
            currentFilter = filter;
            displayedNotifications = 5;

            // تحديث التبويبات
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            loadNotifications(filter, displayedNotifications);
        }

        // تحميل المزيد
        function loadMoreNotifications() {
            displayedNotifications += 5;
            loadNotifications(currentFilter, displayedNotifications);
        }

        // تعيين كمقروء
        function markAsRead(id) {
            const notification = notificationsData.find(n => n.id === id);
            if (notification && !notification.read) {
                notification.read = true;
                loadNotifications(currentFilter, displayedNotifications);
                updateStats();
                showNotification('تم تعيين الإشعار كمقروء', 'success');
            }
        }

        // حذف إشعار
        function deleteNotification(id) {
            const index = notificationsData.findIndex(n => n.id === id);
            if (index > -1) {
                notificationsData.splice(index, 1);
                loadNotifications(currentFilter, displayedNotifications);
                updateStats();
                showNotification('تم حذف الإشعار', 'success');
            }
        }

        // مشاركة إشعار
        function shareNotification(id) {
            const notification = notificationsData.find(n => n.id === id);
            if (notification) {
                const text = `${notification.title}\n\n${notification.message}\n\nمن تطبيق ريف وصاب`;

                if (navigator.share) {
                    navigator.share({
                        title: notification.title,
                        text: text
                    });
                } else {
                    navigator.clipboard.writeText(text);
                    showNotification('تم نسخ الإشعار للحافظة', 'success');
                }
            }
        }

        // مسح الكل
        function clearAllNotifications() {
            if (confirm('هل أنت متأكد من مسح جميع الإشعارات؟')) {
                notificationsData.length = 0;
                loadNotifications(currentFilter, displayedNotifications);
                updateStats();
                showNotification('تم مسح جميع الإشعارات', 'success');
            }
        }

        // تحديث إحصائيات الإشعارات فقط (لا نكتب فوق إحصائيات المستخدمين)
        function updateStats() {
            const unreadCount = notificationsData.filter(n => !n.read).length;
            const totalCountEl = document.getElementById('notifTotalCount');
            const unreadCountEl = document.getElementById('notifUnreadCount');
            const promoCountEl = document.getElementById('notifPromoCount');
            const orderCountEl = document.getElementById('notifOrderCount');
            if (totalCountEl) totalCountEl.textContent = notificationsData.length;
            if (unreadCountEl) unreadCountEl.textContent = unreadCount;
            if (promoCountEl) promoCountEl.textContent = notificationsData.filter(n => n.type === 'promo').length;
            if (orderCountEl) orderCountEl.textContent = notificationsData.filter(n => n.type === 'order').length;

            const badge = document.getElementById('unreadBadge');
            if (badge) {
                if (unreadCount > 0) {
                    badge.textContent = `📬 ${unreadCount} إشعارات جديدة`;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }
            }
        }

        // نظام الإشعارات
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: ${type === 'success' ? 'var(--success)' :
                    type === 'warning' ? 'var(--warning)' :
                        type === 'error' ? 'var(--danger)' : 'var(--info)'};
                color: white;
                padding: 15px 25px;
                border-radius: 25px;
                font-weight: bold;
                z-index: 1000;
                box-shadow: 0 5px 15px rgba(0,0,0,0.3);
                animation: slideDown 0.3s ease-out;
                font-family: 'Tajawal', sans-serif;
            `;
            notification.textContent = message;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideUp 0.3s ease-out';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        // إضافة أنماط الإشعارات
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from { transform: translate(-50%, -100%); opacity: 0; }
                to { transform: translate(-50%, 0); opacity: 1; }
            }
            @keyframes slideUp {
                from { transform: translate(-50%, 0); opacity: 1; }
                to { transform: translate(-50%, -100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // تهيئة الصفحة
        document.addEventListener('DOMContentLoaded', function () {
            loadUsers();
            loadNotifications();

            // تأثيرات التمرير
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.animation = 'fadeIn 0.6s ease-out';
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.fade-in').forEach(element => {
                observer.observe(element);
            });
        });
    </script>
