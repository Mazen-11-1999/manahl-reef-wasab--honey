<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صندوق الإشعارات | ريف وصاب</title>
    <style>
        :root {
            --bg-primary: #120a00;
            --bg-secondary: #1a0f00;
            --bg-card: #1d1102;
            --bg-accent: #2a1804;
            --bg-read: #171008;
            --gold-primary: #d4af37;
            --gold-light: #f3cf7a;
            --gold-dark: #aa8c2c;
            --text-primary: #e0c097;
            --text-secondary: #f3cf7a;
            --text-white: #ffffff;
            --text-muted: #888;
            --text-dim: #555;
            --border-gold: rgba(212, 175, 55, 0.2);
            --shadow-gold: rgba(212, 175, 55, 0.3);
            --glow-gold: rgba(212, 175, 55, 0.8);
            --success: #51cf66;
            --danger: #ff6b6b;
            --warning: #ffd43b;
            --info: #74c0fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
            color: var(--text-primary);
            font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, var(--gold-primary) 1px, transparent 1px),
                radial-gradient(circle at 80% 20%, var(--gold-primary) 1px, transparent 1px),
                radial-gradient(circle at 40% 40%, var(--gold-primary) 1px, transparent 1px);
            background-size: 200px 200px, 150px 150px, 100px 100px;
            opacity: 0.03;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            50% {
                transform: translate(-10px, -10px) rotate(180deg);
            }
        }

        header {
            background: linear-gradient(145deg, var(--bg-accent), var(--bg-card));
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid var(--gold-primary);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            color: var(--gold-primary);
            font-size: 1.3rem;
            font-weight: bold;
            text-shadow: 0 0 10px var(--shadow-gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .notifications-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 20px;
            background: linear-gradient(145deg, var(--bg-card), var(--bg-accent));
            border-radius: 20px;
            border: 1px solid var(--border-gold);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .notifications-title {
            color: var(--gold-primary);
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .clear-all-btn {
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 8px 15px;
            border: 1px solid var(--border-gold);
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .clear-all-btn:hover {
            color: var(--gold-primary);
            border-color: var(--gold-primary);
            transform: translateY(-2px);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-item {
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            transform: translateY(-3px);
            border-color: var(--gold-primary);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .stat-icon {
            font-size: 1.5rem;
            color: var(--gold-primary);
            margin-bottom: 5px;
        }

        .stat-value {
            color: var(--text-white);
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding: 5px;
            background: var(--bg-card);
            border-radius: 15px;
            border: 1px solid var(--border-gold);
        }

        .filter-tab {
            flex: 1;
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .filter-tab:hover {
            color: var(--gold-primary);
            background: rgba(212, 175, 55, 0.1);
        }

        .filter-tab.active {
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-light));
            color: var(--bg-primary);
            box-shadow: 0 3px 10px var(--shadow-gold);
        }

        .notifications-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .notification-item {
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            border-radius: 15px;
            padding: 20px;
            position: relative;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .notification-item.unread {
            border-color: var(--gold-primary);
            box-shadow: 0 0 20px var(--shadow-gold);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 0 20px var(--shadow-gold);
            }

            50% {
                box-shadow: 0 0 30px var(--glow-gold);
            }
        }

        .notification-item.unread::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            width: 12px;
            height: 12px;
            background: var(--gold-primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--glow-gold);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }
        }

        .notification-item.read {
            opacity: 0.8;
            background: var(--bg-read);
            border-color: rgba(212, 175, 55, 0.1);
        }

        .notification-item:hover {
            transform: translateX(-5px);
            border-color: var(--gold-primary);
        }

        .notification-content {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .notification-icon {
            font-size: 2rem;
            color: var(--gold-primary);
            min-width: 50px;
            text-align: center;
        }

        .notification-details {
            flex: 1;
        }

        .notification-title {
            color: var(--text-white);
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .notification-message {
            color: var(--text-primary);
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .notification-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .notification-time {
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .notification-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 5px 10px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--border-gold);
            border-radius: 15px;
            color: var(--gold-primary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--gold-primary);
            color: var(--bg-primary);
            transform: translateY(-2px);
        }

        .notification-type {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 10px;
        }

        .type-promo {
            background: var(--warning);
            color: var(--bg-primary);
        }

        .type-order {
            background: var(--success);
            color: white;
        }

        .type-info {
            background: var(--info);
            color: white;
        }

        .type-alert {
            background: var(--danger);
            color: white;
        }

        .type-welcome {
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-light));
            color: var(--bg-primary);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 4rem;
            color: var(--border-gold);
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        .empty-message {
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .load-more {
            text-align: center;
            margin-top: 30px;
        }

        .load-more-btn {
            padding: 15px 30px;
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-light));
            border: none;
            border-radius: 25px;
            color: var(--bg-primary);
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px var(--shadow-gold);
        }

        .load-more-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--shadow-gold);
        }

        .floating-badge {
            position: fixed;
            top: 80px;
            left: 20px;
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-light));
            color: var(--bg-primary);
            padding: 10px 15px;
            border-radius: 25px;
        }

        /* تصميم الإحصائيات */
        .notification-stats {
            display: flex;
            gap: 15px;
            margin: 8px 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .notification-stats span {
            display: flex;
            align-items: center;

            /* تصميم حاوية الشارات الحالية */
            .current-badge-container {
                margin: 12px 0;
                padding: 8px;
                background: rgba(212, 175, 55, 0.05);
                border-radius: 8px;
                border: 1px solid rgba(212, 175, 55, 0.1);
            }

            .current-badge {
                position: relative;
                display: inline-flex;
                align-items: center;
                padding: 8px 20px;
                border-radius: 6px;
                border: 1px solid #8a6d3b;
                box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.3);
                overflow: hidden;
                cursor: default;
                user-select: none;
                font-size: 14px;
                font-weight: 800;
                letter-spacing: 0.5px;
                text-shadow: 0 0.5px 0 rgba(255, 255, 255, 0.3);
                white-space: nowrap;
                margin: 4px 0;
            }

            .premium-badge-display {
                background: linear-gradient(135deg,
                        #a67c00 0%,
                        #ffbf00 25%,
                        #ffdc73 50%,
                        #ffbf00 75%,
                        #a67c00 100%);
                color: #4a3701;
            }

            .vip-badge.vip {
                background: linear-gradient(135deg, #4a3701 0%, #8a6d3b 25%, #d4af37 50%, #8a6d3b 75%, #4a3701 100%);
                color: #fff;
                position: relative;
                overflow: hidden;
            }

            .vip-badge.owner {
                background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 20%, #b38728 40%, #fbf5b7 60%, #aa771c 80%, #bf953f 100%);
                border: 1px solid rgba(166, 124, 0, 0.8);
                color: #3e2e01;
                position: relative;
                overflow: hidden;
                clip-path: polygon(0% 10%, 50% 0%, 100% 10%, 100% 85%, 50% 100%, 0% 85%);
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5), inset 0 2px 3px rgba(255, 255, 255, 0.6), inset 0 -2px 3px rgba(0, 0, 0, 0.3);
            }

            .vip-badge.owner::before {
                content: '';
                position: absolute;
                top: 0;
                left: -150%;
                width: 60%;
                height: 100%;
                background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.8) 50%, transparent 100%);
                transform: skewX(-25deg);
                animation: ownerShine 4s infinite ease-in-out;
            }

            @keyframes ownerShine {
                0% {
                    left: -150%;
                }

                20% {
                    left: 150%;
                }

                100% {
                    left: 150%;
                }
            }

            .vip-badge.vip::before {
                content: '';
                position: absolute;
                top: 0;
                left: -150%;
                width: 50%;
                height: 100%;
                background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.4), transparent);
                transform: skewX(-30deg);
                animation: vipShine 3s infinite;
            }

            @keyframes vipShine {
                0% {
                    left: -150%;
                }

                50% {
                    left: 150%;
                }

                100% {
                    left: 150%;
                }
            }

            /* تصميم شارة VIP الماسية */
            .vip-diamond-badge {
                position: relative;
                display: inline-flex;
                align-items: center;
                padding: 12px 35px;
                background: linear-gradient(135deg, #a67c00 0%, #bf953f 25%, #fcf6ba 50%, #bf953f 75%, #a67c00 100%);
                border-radius: 8px;
                border: 2px solid #8a6d3b;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.5);
                overflow: hidden;
                cursor: pointer;
                transition: transform 0.3s ease;
                font-size: 16px;
                font-weight: 800;
                white-space: nowrap;
                margin: 4px 0;
            }

            .vip-diamond-badge:hover {
                transform: scale(1.05) translateY(-3px);
                box-shadow: 0 15px 40px rgba(212, 175, 55, 0.3);
            }

            .diamond-dust-bg {
                position: absolute;
                top: 2px;
                left: 2px;
                right: 2px;
                bottom: 2px;
                background-color: #1a1a1a;
                background-image:
                    radial-gradient(white, rgba(255, 255, 255, .2) 2px, transparent 3px),
                    radial-gradient(white, rgba(255, 255, 255, .15) 1px, transparent 2px),
                    radial-gradient(white, rgba(255, 255, 255, .1) 2px, transparent 3px),
                    radial-gradient(white, rgba(255, 255, 255, .05) 2px, transparent 3px);
                background-size: 20px 20px, 15px 15px, 30px 30px;
                background-position: 0 0, 5px 10px, 15px 5px;
                border-radius: 6px;
                z-index: 1;
            }

            .diamond-sparkle {
                position: absolute;
                top: 0;
                left: -150%;
                width: 50%;
                height: 100%;
                background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.8), transparent);
                transform: skewX(-30deg);
                animation: diamondSparkle 2s infinite;
                opacity: 0;
                z-index: 3;
            }

            @keyframes diamondSparkle {

                0%,
                100% {
                    opacity: 0;
                }

                50% {
                    opacity: 1;
                }
            }

            /* تصميم شارة سلطان العسل */
            .sultan-badge {
                position: relative;
                display: inline-flex;
                align-items: center;
                padding: 15px 40px;
                background: linear-gradient(135deg, #8a6426 0%, #d4af37 25%, #fcf6ba 50%, #d4af37 75%, #8a6426 100%);
                clip-path: polygon(10% 0%, 90% 0%, 100% 50%, 90% 100%, 10% 100%, 0% 50%, 0% 50%);
                border: 2px solid #7a5a1e;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 2px 3px rgba(255, 255, 255, 0.6);
                overflow: hidden;
                cursor: pointer;
                transition: transform 0.3s ease, box-shadow 0.3s ease;
                font-size: 18px;
                font-weight: 900;
                white-space: nowrap;
                margin: 4px 0;
            }

            .sultan-badge:hover {
                transform: scale(1.08) translateY(-3px) rotate(-1deg);
                box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4);
            }

            .royal-black-bg {
                position: absolute;
                top: 2px;
                left: 2px;
                right: 2px;
                bottom: 2px;
                background-color: #0f0f0f;
                border-radius: 6px;
                z-index: 1;
            }

            .sultan-content {
                position: relative;
                display: flex;
                align-items: center;
                z-index: 2;
            }

            .sultan-icon {
                width: 30px;
                height: 30px;
                margin-left: 18px;
                fill: #c0392b;
                filter: drop-shadow(0 0 8px #e74c3c);
            }

            .sultan-text {
                background: linear-gradient(to bottom, #fcf6ba 0%, #bf953f 100%);
                background-clip: text;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                font-size: 22px;
                font-weight: 900;
                letter-spacing: 1.5px;
                text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
                white-space: nowrap;
                line-height: 1;
            }

            .halo-pulse {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 100%;
                height: 100%;
                background: rgba(212, 175, 55, 0.3);
                border-radius: 10px;
                z-index: 0;
                transform: translate(-50%, -50%) scale(1);
                animation: haloPulse 3s infinite;
                opacity: 0;
            }

            @keyframes haloPulse {
                0% {
                    transform: translate(-50%, -50%) scale(1);
                    opacity: 0;
                }

                50% {
                    transform: translate(-50%, -50%) scale(1.1);
                    opacity: 0.6;
                }

                100% {
                    transform: translate(-50%, -50%) scale(1.2);
                    opacity: 0;
                }
            }

            .gold-glint {
                position: absolute;
                top: 0;
                left: -150%;
                width: 50%;
                height: 100%;
                background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.6), transparent);
                transform: skewX(-30deg);
                animation: goldGlintMove 6s infinite;
                z-index: 3;
            }

            @keyframes goldGlintMove {
                0% {
                    left: -150%;
                }

                15% {
                    left: 150%;
                }

                100% {
                    left: 150%;
                }
            }

            .honey-friend-badge {
                position: relative;
                display: inline-flex;
                align-items: center;
                padding: 8px 30px;
                background: linear-gradient(135deg,
                        #8a6426 0%,
                        #d4af37 20%,
                        #f9e498 50%,
                        #d4af37 80%,
                        #8a6426 100%);
                clip-path: polygon(10% 0%, 90% 0%, 100% 50%, 90% 100%, 10% 100%, 0% 50%);
                border: none;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
                cursor: pointer;
                transition: all 0.3s ease;
                font-size: 14px;
                font-weight: 900;
                color: #2d2101;
                text-shadow: 0 0.5px 0 rgba(255, 255, 255, 0.3);
                white-space: nowrap;
            }

            .honey-friend-badge:hover {
                transform: scale(1.1) rotate(1deg);
                filter: brightness(1.1);
            }

            .icon-holder {
                background: rgba(255, 255, 255, 0.9);
                border-radius: 50%;
                width: 28px;
                height: 28px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-left: 15px;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            }

            .bee-svg {
                width: 18px;
                height: 18px;
                fill: #b38728;
            }

            .glass-top {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 50%;
                background: rgba(255, 255, 255, 0.15);
            }

            /* تصميم شارة عضو فعال */
            .active-member-badge {
                position: relative;
                padding: 3px;
                background: linear-gradient(90deg, #8a6426, #f9e498, #8a6426);
                border-radius: 12px;
                overflow: hidden;
                display: inline-flex;
                justify-content: center;
                align-items: center;
                font-size: 14px;
                font-weight: 900;
                white-space: nowrap;
            }

            .active-member-badge::before {
                content: '';
                position: absolute;
                width: 150%;
                height: 150%;
                background: conic-gradient(#f9e498, transparent, transparent, #f9e498);
                animation: rotateBorder 4s linear infinite;
            }

            .active-member-inner {
                position: relative;
                background: #1a1a1a;
                padding: 8px 25px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                z-index: 2;
            }

            .active-member-text {
                background: linear-gradient(to bottom, #fcf6ba 0%, #bf953f 100%);
                background-clip: text;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                font-size: 16px;
                font-weight: 900;
                white-space: nowrap;
            }

            .active-icon {
                width: 22px;
                height: 22px;
                margin-left: 12px;
                fill: #f9e498;
                filter: drop-shadow(0 0 5px #d4af37);
            }

            .text-shine {
                position: absolute;
                top: 0;
                left: -100%;
                width: 50%;
                height: 100%;
                background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.2), transparent);
                transition: all 0.5s;
                animation: textGlow 3s infinite;
            }

            @keyframes rotateBorder {
                from {
                    transform: rotate(0deg);
                }

                to {
                    transform: rotate(360deg);
                }
            }

            @keyframes textGlow {
                0% {
                    left: -100%;
                }

                50% {
                    left: 100%;
                }

                100% {
                    left: 100%;
                }
            }

            /* تصميم شارة شريك موثوق */
            .trusted-partner-wrapper {
                position: relative;
                display: inline-flex;
                justify-content: center;
                align-items: center;
            }

            .trusted-partner-wrapper::after {
                content: '';
                position: absolute;
                width: 100%;
                height: 100%;
                border-radius: 8px;
                background: rgba(212, 175, 55, 0.4);
                z-index: -1;
                animation: pulse-gold 2s infinite;
            }

            .partner-badge {
                position: relative;
                background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
                border: 2px solid #d4af37;
                padding: 10px 28px;
                border-radius: 6px;
                display: flex;
                align-items: center;
                overflow: hidden;
                box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
                font-size: 14px;
                font-weight: 900;
                white-space: nowrap;
            }

            .shield-icon {
                width: 24px;
                height: 24px;
                margin-left: 15px;
                fill: #f9e498;
                filter: drop-shadow(0 0 3px #bf953f);
            }

            .partner-text {
                color: #f9e498;
                font-size: 16px;
                font-weight: 900;
                letter-spacing: 0.5px;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
                white-space: nowrap;
            }

            .fast-glint {
                position: absolute;
                top: 0;
                left: -150%;
                width: 30%;
                height: 100%;
                background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.6), transparent);
                transform: skewX(-20deg);
                animation: move-glint 3.5s infinite linear;
            }

            @keyframes pulse-gold {
                0% {
                    transform: scale(1);
                    opacity: 0.7;
                }

                70% {
                    transform: scale(1.15);
                    opacity: 0;
                }

                100% {
                    transform: scale(1);
                    opacity: 0;
                }
            }

            @keyframes move-glint {
                0% {
                    left: -150%;
                }

                20% {
                    left: 150%;
                }

                100% {
                    left: 150%;
                }
            }

            .partner-badge:hover {
                border-color: #fcf6ba;
                transform: translateY(-2px);
                transition: 0.3s;
            }

            /* تصميم شارة عميل جديد */
            .new-client-badge {
                position: relative;
                display: inline-flex;
                align-items: center;
                padding: 8px 24px;
                background: linear-gradient(135deg, #bdc3c7 0%, #ecf0f1 50%, #bdc3c7 100%);
                border-radius: 50px;
                border: 1px solid #95a5a6;
                box-shadow: 0 3px 12px rgba(255, 255, 255, 0.15);
                overflow: hidden;
                cursor: default;
                font-size: 16px;
                font-weight: 800;
                white-space: nowrap;
                margin: 4px 0;
            }

            .new-icon {
                width: 20px;
                height: 20px;
                margin-left: 12px;
                fill: #2c3e50;
                animation: bounce 2s infinite ease-in-out;
            }

            .new-text {
                color: #2c3e50;
                font-size: 16px;
                font-weight: 800;
                white-space: nowrap;
            }

            .twinkle {
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, transparent 70%);
                opacity: 0;
                animation: twinkle-move 4s infinite;
            }

            @keyframes twinkle-move {
                0% {
                    left: -100%;
                    opacity: 0;
                }

                50% {
                    left: 0%;
                    opacity: 0.5;
                }

                100% {
                    left: 100%;
                    opacity: 0;
                }
            }

            @keyframes bounce {

                0%,
                100% {
                    transform: translateY(0);
                }

                50% {
                    transform: translateY(-2px);
                }
            }

            /* تصميم اقتراحات الترقية */
            .upgrade-suggestion {
                background: linear-gradient(45deg, var(--gold-primary), var(--gold-light));
                color: var(--bg-primary);
                padding: 6px 12px;
                border-radius: 15px;
                font-size: 0.75rem;
                font-weight: bold;
                margin-top: 8px;
                text-align: center;
                animation: pulse 2s infinite;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .upgrade-suggestion:hover {
                transform: scale(1.05);
                box-shadow: 0 5px 15px var(--shadow-gold);
            }

            @keyframes pulse {

                0%,
                100% {
                    opacity: 0.8;
                }

                50% {
                    opacity: 1;
                }
            }

            /* تأثير اللمعان المتحرك */
            .current-badge::before {
                content: '';
                position: absolute;
                top: 0;
                left: -150%;
                width: 50%;
                height: 100%;
                background: linear-gradient(to right,
                        transparent 0%,
                        rgba(255, 255, 255, 0.7) 50%,
                        transparent 100%);
                transform: skewX(-30deg);
                animation: shine 3.5s infinite;
            }

            @keyframes shine {
                0% {
                    left: -150%;
                }

                20% {
                    left: 150%;
                }

                100% {
                    left: 150%;
                }
            }

            /* نافذة اختيار الشارات */
            .badge-modal {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                z-index: 1000;
                justify-content: center;
                align-items: center;
            }

            .badge-modal-content {
                background: var(--bg-card);
                border: 2px solid var(--gold-primary);
                border-radius: 15px;
                padding: 30px;
                max-width: 400px;
                width: 90%;
                text-align: center;
            }

            .badge-modal-title {
                color: var(--gold-primary);
                font-size: 1.2rem;
                margin-bottom: 20px;
            }

            .badge-options {
                display: flex;
                flex-direction: column;
                gap: 10px;
                margin-bottom: 20px;
            }

            .badge-option {
                padding: 10px;
                border: 1px solid var(--border-gold);
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.3s ease;
                background: var(--bg-primary);
                color: var(--text-secondary);
            }

            .badge-option:hover {
                border-color: var(--gold-primary);
                background: var(--bg-accent);
                color: var(--text-primary);
            }

            .badge-modal-actions {
                display: flex;
                gap: 10px;
                justify-content: center;
            }

            .badge-modal-btn {
                padding: 10px 20px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-weight: bold;
                transition: all 0.3s ease;
            }

            .badge-modal-btn.primary {
                background: var(--gold-primary);
                color: var(--bg-primary);
            }

            .badge-modal-btn.secondary {
                background: var(--bg-accent);
                color: var(--text-secondary);
            }

            .badge-option.selected {
                border-color: var(--gold-primary);
                background: var(--bg-accent);
                color: var(--text-primary);
            }

            .floating-badge {
                font-weight: bold;
                font-size: 0.9rem;
                box-shadow: 0 5px 20px var(--shadow-gold);
                z-index: 50;
                animation: slideIn 0.5s ease-out;
            }

            @keyframes slideIn {
                from {
                    transform: translateX(-100%);
                    opacity: 0;
                }

                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }

            @media (max-width: 768px) {
                .container {
                    padding: 15px 10px;
                }

                .stats-bar {
                    grid-template-columns: repeat(2, 1fr);
                }

                .filter-tabs {
                    flex-wrap: wrap;
                }

                .filter-tab {
                    min-width: calc(50% - 5px);
                }

                .notifications-header {
                    flex-direction: column;
                    gap: 15px;
                    text-align: center;
                }

                .notification-content {
                    gap: 10px;
                }

                .notification-icon {
                    font-size: 1.5rem;
                    min-width: 40px;
                }

                .notification-title {
                    font-size: 1rem;
                }

                .notification-message {
                    font-size: 0.85rem;
                }

                .floating-badge {
                    top: auto;
                    bottom: 20px;
                    left: 50%;
                    transform: translateX(-50%);
                }
            }

            @media (max-width: 480px) {
                .stats-bar {
                    grid-template-columns: 1fr;
                }

                .filter-tab {
                    min-width: 100%;
                }

                .notification-meta {
                    flex-direction: column;
                    gap: 10px;
                    align-items: flex-start;
                }

                .notification-actions {
                    width: 100%;
                    justify-content: space-between;
                }
            }

            .fade-in {
                animation: fadeIn 0.6s ease-out;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .slide-up {
                animation: slideUp 0.5s ease-out;
            }

            @keyframes slideUp {
                from {
                    transform: translateY(50px);
                    opacity: 0;
                }

                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }
    </style>
</head>

<body>
    <!-- API Integration -->
    <script src="../js/api.js"></script>

    <!-- نافذة اختيار الشارات -->
    <div class="badge-modal" id="badgeModal">
        <div class="badge-modal-content">
            <h3 class="badge-modal-title" id="badgeModalTitle">تغيير شارة العميل</h3>
            <div class="badge-options" id="badgeModalContent">
                <!-- سيتم ملؤه ديناميكياً -->
            </div>
        </div>
    </div>

    <header>
        <div class="header-content">
            <a href="dashboard.html" class="back-button" title="العودة للوحة التحكم">
                <i class="fas fa-arrow-right"></i>
            </a>
            <h1 class="header-title">
                <i class="fas fa-users"></i>
                <span>إدارة المستخدمين</span>
            </h1>
        </div>
    </header>

    <div class="container">

        <!-- شارة الإشعارات غير المقروءة -->
        <div class="floating-badge" id="unreadBadge" style="display: none;">
            <i class="fas fa-bell"></i> <span id="unreadBadgeText">0 إشعارات جديدة</span>
        </div>

        <!-- شريط الإحصائيات -->
        <div class="stats-bar fade-in">
            <div class="stat-item">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">إجمالي المستخدمين</div>
            </div>
            <div class="stat-item">
                <div class="stat-icon"><i class="fas fa-user-check"></i></div>
                <div class="stat-value" id="activeCount">0</div>
                <div class="stat-label">نشطون</div>
            </div>
            <div class="stat-item">
                <div class="stat-icon"><i class="fas fa-crown"></i></div>
                <div class="stat-value" id="vipCount">0</div>
                <div class="stat-label">VIP</div>
            </div>
            <div class="stat-item">
                <div class="stat-icon"><i class="fas fa-user-tie"></i></div>
                <div class="stat-value" id="agentCount">0</div>
                <div class="stat-label">مناديب</div>
            </div>
        </div>

        <!-- رأس المستخدمين -->
        <div class="notifications-header fade-in">
            <h2 class="notifications-title">
                <i class="fas fa-users"></i>
                <span>قائمة المستخدمين</span>
            </h2>
            <button class="clear-all-btn" onclick="refreshUsers()">
                <i class="fas fa-sync-alt"></i> تحديث
            </button>
        </div>

        <!-- تبويبات التصفية -->
        <div class="filter-tabs fade-in">
            <button class="filter-tab active" onclick="filterUsers('all')">الكل</button>
            <button class="filter-tab" onclick="filterUsers('active')">نشطون</button>
            <button class="filter-tab" onclick="filterUsers('vip')">VIP</button>
            <button class="filter-tab" onclick="filterUsers('agents')">مناديب</button>
            <button class="filter-tab" onclick="filterUsers('new')">جدد</button>
        </div>

        <!-- قائمة المستخدمين -->
        <div class="notifications-list" id="usersList">
            <!-- سيتم ملؤه ديناميكياً -->
        </div>

        <!-- زر تحميل المزيد -->
        <div class="load-more">
            <button class="load-more-btn" onclick="loadMoreUsers()">
                <i class="fas fa-arrow-down"></i> تحميل المزيد
            </button>
        </div>

    </div>

    <script>
        // تحميل المستخدمين من API
        async function loadUsers() {
            try {
                if (!window.API || !window.API.customers) {
                    console.warn('API not available');
                    return;
                }

                const response = await window.API.customers.getAll({ limit: 50 });
                const users = response.data || response.customers || [];

                // تحديث الإحصائيات
                const total = users.length;
                const active = users.filter(u => u.status === 'active').length;
                const vip = users.filter(u => u.isVIP).length;
                const agents = users.filter(u => u.role === 'agent').length;

                document.getElementById('totalCount').textContent = total;
                document.getElementById('activeCount').textContent = active;
                document.getElementById('vipCount').textContent = vip;
                document.getElementById('agentCount').textContent = agents;

                // عرض المستخدمين
                displayUsers(users);
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        // عرض المستخدمين
        function displayUsers(users) {
            const list = document.getElementById('usersList');
            if (!list) return;

            if (users.length === 0) {
                list.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                        <i class="fas fa-users" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;"></i>
                        <p>لا يوجد مستخدمين</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = users.map(user => {
                const name = user.profile?.firstName && user.profile?.lastName
                    ? `${user.profile.firstName} ${user.profile.lastName}`
                    : user.username || user.email || 'مستخدم';
                const phone = user.profile?.phone || user.phone || 'غير متوفر';
                const orderCount = user.orderCount || 0;
                const totalSpent = user.totalSpent || 0;

                // عرض الشارة الحالية
                let currentBadge = '';
                let upgradeSuggestion = '';

                if (user.badgeType === 'vip') {
                    currentBadge = '<div class="current-badge vip-badge-display">👑 VIP مناحل ريف وصاب</div>';
                } else if (user.badgeType === 'premium') {
                    currentBadge = '<div class="current-badge premium-badge-display">🍯 عميل مميز - ريف وصاب</div>';
                    upgradeSuggestion = '<div class="upgrade-suggestion">هل تريد ترقيته إلى صديق العسل؟</div>';
                } else if (user.badgeType === 'honey-friend') {
                    currentBadge = `<div class="honey-friend-badge">
                        <div class="glass-top"></div>
                        <div class="glint"></div>
                        <div class="icon-holder">
                            <svg class="bee-svg" viewBox="0 0 24 24">
                                <path d="M12,2C12,2 13.73,4.11 15.35,5.19C16.14,5.72 17.03,6.17 17.91,6.56C18.66,6.89 19.46,7.17 20.25,7.38C21.14,7.63 22,7.72 22,7.72V10.14C22,10.14 21.14,10 20.25,9.75C19.46,9.54 18.66,9.22 17.91,8.89C17.03,8.5 16.14,8.05 15.35,7.52C13.73,6.44 12,4.33 12,4.33M12,13A2,2 0 0,0 10,11A2,2 0 0,0 8,13A2,2 0 0,0 10,15A2,2 0 0,0 12,13M14,13A2,2 0 0,0 16,11A2,2 0 0,0 18,13A2,2 0 0,0 16,15A2,2 0 0,0 14,13M12,22V19.86C12,19.86 10.27,17.75 8.65,16.67C7.86,16.14 6.97,15.69 6.09,15.3C5.34,14.97 4.54,14.69 3.75,14.48C2.86,14.23 2,14.09 2,14.09V11.67C2,11.67 2.86,11.81 3.75,12.06C4.54,12.27 5.34,12.55 6.09,12.88C6.97,13.27 7.86,13.72 8.65,14.25C10.27,15.33 12,17.44 12,17.44Z" />
                            </svg>
                        </div>
                        <span>صديق العسل - لمناحل ريف وصاب</span>
                    </div>`;
                    upgradeSuggestion = '<div class="upgrade-suggestion">هل تريد ترقيته إلى عضو فعال؟</div>';
                } else if (user.badgeType === 'active-member') {
                    currentBadge = `<div class="active-member-badge">
                        <div class="active-member-inner">
                            <svg class="active-icon" viewBox="0 0 24 24">
                                <path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z" />
                            </svg>
                            <span class="active-member-text">عضو فعال بمناحل ريف وصاب</span>
                            <div class="text-shine"></div>
                        </div>
                    </div>`;
                    upgradeSuggestion = '<div class="upgrade-suggestion">هل تريد ترقيته إلى شريك موثوق؟</div>';
                } else if (user.badgeType === 'sultan') {
                    currentBadge = `<div class="trusted-partner-wrapper">
                        <div class="partner-badge">
                            <div class="fast-glint"></div>
                            <svg class="shield-icon" viewBox="0 0 24 24">
                                <path d="M12,1L3,5V11C3,16.55 6.84,21.74 12,23C17.16,21.74 21,16.55 21,11V5L12,1M12,7L14,10H17L14.5,12.5L15.5,16L12,14L8.5,16L9.5,12.5L7,10H10L12,7Z" />
                            </svg>
                            <span class="partner-text">شريك موثوق لـ مناحل ريف وصاب</span>
                        </div>
                    </div>`;
                    upgradeSuggestion = '<div class="upgrade-suggestion">هل تريد ترقيته إلى VIP؟</div>';
                } else if (user.badgeType === 'owner') {
                    currentBadge = `<div class="vip-badge owner">
                        <div class="shield-icon" viewBox="0 0 24 24">
                            <path d="M5 16L3 5L8.5 10L12 4L15.5 10L21 5L19 16H5M19 19C19 19.55 18.55 20 18 20H6C5.45 20 5 19.55 5 19V18H19V19Z" />
                        </div>
                        <span class="partner-text">الــمــالـك</span>
                    </div>`;
                } else if (user.badgeType === 'new-client') {
                    currentBadge = `<div class="new-client-badge">
                        <div class="twinkle"></div>
                        <svg class="new-icon" viewBox="0 0 24 24">
                            <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />
                        </svg>
                        <span class="new-text">عميل جديد لمناحل ريف وصاب</span>
                    </div>`;
                    upgradeSuggestion = '<div class="upgrade-suggestion">هل تريد ترقيته إلى عميل مميز؟</div>';
                } else {
                    // بدون شارة - اقتراح ترقية
                    if (orderCount >= 3) {
                        upgradeSuggestion = '<div class="upgrade-suggestion">هل تريد ترقيته إلى عميل مميز؟</div>';
                    } else if (orderCount >= 1) {
                        upgradeSuggestion = '<div class="upgrade-suggestion">عميل جديد - يمكن ترقيته</div>';
                    }
                }

                return `
                    <div class="notification-item ${!user.read ? 'unread' : ''}">
                        <div class="notification-icon">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="notification-content">
                            <div class="notification-title">${name}</div>
                            <div class="notification-message">${phone}</div>
                            <div class="notification-stats">
                                <span><i class="fas fa-shopping-cart"></i> ${orderCount} مشتريات</span>
                                <span><i class="fas fa-money-bill"></i> ${totalSpent.toLocaleString()} ريال</span>
                            </div>
                            <div class="current-badge-container">
                                ${currentBadge}
                                ${upgradeSuggestion}
                            </div>
                            <div class="notification-meta">
                                <span><i class="fas fa-envelope"></i> ${user.email || 'غير متوفر'}</span>
                                <span><i class="fas fa-calendar"></i> ${new Date(user.createdAt).toLocaleDateString('ar-YE')}</span>
                            </div>
                        </div>
                        <div class="notification-actions">
                            <button class="action-btn" onclick="viewUser('${user._id}')">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="action-btn" onclick="showBadgeOptions('${user._id}', '${name.replace(/'/g, "\\'")}', '${user.badgeType || 'none'}')">
                                <i class="fas fa-crown"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // قائمة الإشعارات — تُملأ من API أو تبقى فارغة (لا بيانات وهمية)
        let notificationsData = [];

        let currentFilter = 'all';
        let displayedNotifications = 5;

        // تحميل الإشعارات (تعمل فقط إذا وُجد عنصر قائمة الإشعارات في الصفحة)
        function loadNotifications(filter = 'all', limit = 5) {
            const notificationsList = document.getElementById('notificationsList');
            if (!notificationsList) return;
            notificationsList.innerHTML = '';

            let filteredNotifications = notificationsData;

            if (filter === 'unread') {
                filteredNotifications = notificationsData.filter(n => !n.read);
            } else if (filter === 'promo') {
                filteredNotifications = notificationsData.filter(n => n.type === 'promo');
            } else if (filter === 'order') {
                filteredNotifications = notificationsData.filter(n => n.type === 'order');
            } else if (filter === 'info') {
                filteredNotifications = notificationsData.filter(n => n.type === 'info');
            }

            const notificationsToShow = filteredNotifications.slice(0, limit);

            if (notificationsToShow.length === 0) {
                notificationsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-title">لا توجد إشعارات</div>
                        <div class="empty-message">لم يتم العثور على إشعارات في هذه الفئة</div>
                    </div>
                `;
                return;
            }

            notificationsToShow.forEach((notification, index) => {
                const notificationItem = createNotificationElement(notification);
                notificationItem.style.animationDelay = `${index * 0.1}s`;
                notificationItem.classList.add('fade-in');
                notificationsList.appendChild(notificationItem);
            });

            updateStats();
        }

        // إنشاء عنصر الإشعار
        function createNotificationElement(notification) {
            const div = document.createElement('div');
            div.className = `notification-item ${notification.read ? 'read' : 'unread'}`;
            div.onclick = () => markAsRead(notification.id);

            const typeClass = `type-${notification.type}`;
            const typeText = getTypeText(notification.type);

            div.innerHTML = `
                <div class="notification-content">
                    <div class="notification-icon">${notification.icon}</div>
                    <div class="notification-details">
                        <h3 class="notification-title">
                            ${notification.title}
                            <span class="notification-type ${typeClass}">${typeText}</span>
                        </h3>
                        <p class="notification-message">${notification.message}</p>
                        <div class="notification-meta">
                            <span class="notification-time">🕐 ${notification.time}</span>
                            <div class="notification-actions">
                                <button class="action-btn" onclick="event.stopPropagation(); deleteNotification(${notification.id})">حذف</button>
                                <button class="action-btn" onclick="event.stopPropagation(); shareNotification(${notification.id})">مشاركة</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            return div;
        }

        // الحصول على نص النوع
        function getTypeText(type) {
            const types = {
                promo: 'عرض',
                order: 'طلب',
                info: 'معلومة',
                alert: 'تنبيه',
                welcome: 'ترحيب'
            };
            return types[type] || 'عام';
        }

        // تصفية الإشعارات
        function filterNotifications(filter) {
            currentFilter = filter;
            displayedNotifications = 5;

            // تحديث التبويبات
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            loadNotifications(filter, displayedNotifications);
        }

        // تحميل المزيد
        function loadMoreNotifications() {
            displayedNotifications += 5;
            loadNotifications(currentFilter, displayedNotifications);
        }

        // تعيين كمقروء
        function markAsRead(id) {
            const notification = notificationsData.find(n => n.id === id);
            if (notification && !notification.read) {
                notification.read = true;
                loadNotifications(currentFilter, displayedNotifications);
                updateStats();
                showNotification('تم تعيين الإشعار كمقروء', 'success');
            }
        }

        // حذف إشعار
        function deleteNotification(id) {
            const index = notificationsData.findIndex(n => n.id === id);
            if (index > -1) {
                notificationsData.splice(index, 1);
                loadNotifications(currentFilter, displayedNotifications);
                updateStats();
                showNotification('تم حذف الإشعار', 'success');
            }
        }

        // مشاركة إشعار
        function shareNotification(id) {
            const notification = notificationsData.find(n => n.id === id);
            if (notification) {
                const text = `${notification.title}\n\n${notification.message}\n\nمن تطبيق ريف وصاب`;

                if (navigator.share) {
                    navigator.share({
                        title: notification.title,
                        text: text
                    });
                } else {
                    navigator.clipboard.writeText(text);
                    showNotification('تم نسخ الإشعار للحافظة', 'success');
                }
            }
        }

        // مسح الكل
        function clearAllNotifications() {
            if (confirm('هل أنت متأكد من مسح جميع الإشعارات؟')) {
                notificationsData.length = 0;
                loadNotifications(currentFilter, displayedNotifications);
                updateStats();
                showNotification('تم مسح جميع الإشعارات', 'success');
            }
        }

        // تحديث إحصائيات الإشعارات فقط (لا نكتب فوق إحصائيات المستخدمين)
        function updateStats() {
            const unreadCount = notificationsData.filter(n => !n.read).length;
            const totalCountEl = document.getElementById('notifTotalCount');
            const unreadCountEl = document.getElementById('notifUnreadCount');
            const promoCountEl = document.getElementById('notifPromoCount');
            const orderCountEl = document.getElementById('notifOrderCount');
            if (totalCountEl) totalCountEl.textContent = notificationsData.length;
            if (unreadCountEl) unreadCountEl.textContent = unreadCount;
            if (promoCountEl) promoCountEl.textContent = notificationsData.filter(n => n.type === 'promo').length;
            if (orderCountEl) orderCountEl.textContent = notificationsData.filter(n => n.type === 'order').length;

            const badge = document.getElementById('unreadBadge');
            if (badge) {
                if (unreadCount > 0) {
                    badge.textContent = `📬 ${unreadCount} إشعارات جديدة`;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }
            }
        }

        // نظام الإشعارات
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: ${type === 'success' ? 'var(--success)' :
                    type === 'warning' ? 'var(--warning)' :
                        type === 'error' ? 'var(--danger)' : 'var(--info)'};
                color: white;
                padding: 15px 25px;
                border-radius: 25px;
                font-weight: bold;
                z-index: 1000;
                box-shadow: 0 5px 15px rgba(0,0,0,0.3);
                animation: slideDown 0.3s ease-out;
                font-family: 'Tajawal', sans-serif;
            `;
            notification.textContent = message;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideUp 0.3s ease-out';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        // إضافة أنماط الإشعارات
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from { transform: translate(-50%, -100%); opacity: 0; }
                to { transform: translate(-50%, 0); opacity: 1; }
            }
            @keyframes slideUp {
                from { transform: translate(-50%, 0); opacity: 1; }
                to { transform: translate(-50%, -100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        document.addEventListener('DOMContentLoaded', function () {

        // اختيار شارة
        function selectBadge(badgeType) {
            document.querySelectorAll('.badge-option').forEach(option => {
                option.classList.remove('selected');
                if (option.dataset.badge === badgeType) {
                    option.classList.add('selected');
                }
            });
        }

        // حفظ الشارة
        async function saveBadge(userId) {
            const selectedOption = document.querySelector('.badge-option.selected');
            if (!selectedOption) {
                alert('الرجاء اختيار شارة');
                return;
            }

            const badgeType = selectedOption.dataset.badge;

            try {
                const response = await fetch(`/api/customers/${userId}/badge`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                    },
                    body: JSON.stringify({ badgeType })
                });

                if (response.ok) {
                    alert('تم تحديث الشارة بنجاح');
                    closeBadgeModal();
                    loadUsers(); // تحديث القائمة
                } else {
                    alert('حدث خطأ أثناء تحديث الشارة');
                }
            } catch (error) {
                console.error('Error updating badge:', error);
                alert('حدث خطأ أثناء تحديث الشارة');
            }
        }
