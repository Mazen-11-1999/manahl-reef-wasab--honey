<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء طلب جديد | مناحل ريف وصاب</title>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Common Styles -->
    <link rel="stylesheet" href="common-styles.css">

    <style>
        :root {
            --bg-primary: #120a00;
            --bg-secondary: #1a0f00;
            --bg-card: #1d1102;
            --bg-accent: #2a1804;
            --bg-input: #000000;
            --gold-primary: #d4af37;
            --gold-light: #f3cf7a;
            --text-primary: #e0c097;
            --text-secondary: #f3cf7a;
            --text-white: #ffffff;
            --text-muted: #888;
            --border-gold: rgba(212, 175, 55, 0.3);
            --shadow-gold: rgba(212, 175, 55, 0.3);
            --success: #008000;
            --danger: #ff4444;
            --warning: #ff9800;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
            color: var(--text-primary);
            font-family: 'Tajawal', 'Cairo', sans-serif;
            min-height: 100vh;
            padding: 20px 15px;
            padding-bottom: 100px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .header-title {
            color: var(--gold-primary);
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-section {
            background: linear-gradient(145deg, var(--bg-card), var(--bg-accent));
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border-gold);
        }

        .section-title {
            color: var(--gold-primary);
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Tajawal', 'Cairo', sans-serif;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px var(--shadow-gold);
        }

        .product-item {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border-gold);
        }

        .product-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .product-name {
            color: var(--text-white);
            font-weight: bold;
        }

        .remove-product {
            background: var(--danger);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .quantity-price {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .add-product-btn {
            width: 100%;
            padding: 12px;
            background: rgba(212, 175, 55, 0.1);
            border: 2px dashed var(--border-gold);
            color: var(--gold-primary);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .add-product-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--gold-primary);
        }

        .order-summary {
            background: linear-gradient(145deg, var(--bg-card), var(--bg-accent));
            padding: 25px;
            border-radius: 15px;
            border: 2px solid var(--gold-primary);
            margin-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-gold);
        }

        .summary-row:last-child {
            border-bottom: none;
            margin-top: 10px;
            padding-top: 15px;
            border-top: 2px solid var(--gold-primary);
        }

        .summary-label {
            color: var(--text-secondary);
        }

        .summary-value {
            color: var(--gold-primary);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--gold-primary), var(--gold-light));
            color: var(--bg-primary);
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--shadow-gold);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--gold-primary);
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 1000;
            display: none;
        }

        .notification.show {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        .notification.success {
            border-color: var(--success);
            background: rgba(0, 128, 0, 0.1);
        }

        .notification.error {
            border-color: var(--danger);
            background: rgba(255, 68, 68, 0.1);
        }

        @keyframes slideDown {
            from {
                transform: translate(-50%, -100px);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        .product-select-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            padding: 20px;
            overflow-y: auto;
        }

        .product-select-modal.active {
            display: block;
        }

        .modal-content {
            background: var(--bg-card);
            border: 2px solid var(--gold-primary);
            border-radius: 15px;
            padding: 25px;
            max-width: 500px;
            margin: 50px auto;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            color: var(--gold-primary);
            font-size: 1.5rem;
        }

        .close-modal {
            background: var(--danger);
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .product-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .product-option {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border-gold);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .product-option:hover {
            border-color: var(--gold-primary);
            background: var(--bg-accent);
        }

        .product-option-name {
            color: var(--text-white);
            font-weight: bold;
            margin-bottom: 5px;
        }

        .product-option-price {
            color: var(--gold-primary);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <a href="dashboard.html" class="back-button" title="العودة للوحة التحكم">
                <i class="fas fa-arrow-right"></i>
            </a>
            <h1 class="header-title">
                <i class="fas fa-plus-circle"></i>
                <span>إنشاء طلب جديد</span>
            </h1>
            <p class="header-subtitle">إضافة طلب يدوياً للعميل</p>
        </header>

        <form id="createOrderForm">
            <!-- بيانات العميل -->
            <div class="form-section">
                <h2 class="section-title">
                    <i class="fas fa-user"></i>
                    <span>بيانات العميل</span>
                </h2>

                <div class="form-group">
                    <label class="form-label">اسم العميل *</label>
                    <input type="text" class="form-input" id="customerName" required placeholder="مثال: أحمد محمد">
                </div>

                <div class="form-group">
                    <label class="form-label">رقم الهاتف *</label>
                    <input type="tel" class="form-input" id="customerPhone" required placeholder="مثال: 773298831">
                </div>

                <div class="form-group">
                    <label class="form-label">البلد</label>
                    <input type="text" class="form-input" id="customerCountry" value="اليمن" placeholder="اليمن">
                </div>

                <div class="form-group">
                    <label class="form-label">المنطقة/المحافظة</label>
                    <input type="text" class="form-input" id="customerRegion" placeholder="مثال: صنعاء">
                </div>

                <div class="form-group">
                    <label class="form-label">العنوان التفصيلي</label>
                    <textarea class="form-input" id="customerAddress" rows="3" placeholder="العنوان الكامل"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">ملاحظات</label>
                    <textarea class="form-input" id="orderNotes" rows="2" placeholder="أي ملاحظات إضافية"></textarea>
                </div>
            </div>

            <!-- المنتجات -->
            <div class="form-section">
                <h2 class="section-title">
                    <i class="fas fa-box"></i>
                    <span>المنتجات</span>
                </h2>

                <div id="productsList">
                    <!-- سيتم إضافة المنتجات هنا -->
                </div>

                <button type="button" class="add-product-btn" onclick="openProductSelect()">
                    <i class="fas fa-plus"></i>
                    إضافة منتج
                </button>
            </div>

            <!-- طريقة الدفع -->
            <div class="form-section">
                <h2 class="section-title">
                    <i class="fas fa-credit-card"></i>
                    <span>طريقة الدفع</span>
                </h2>

                <div class="form-group">
                    <label class="form-label">اختر طريقة الدفع *</label>
                    <select class="form-select" id="paymentMethod" required>
                        <option value="delivery">دفع عند الاستلام</option>
                        <option value="half">دفع نصفي (عربون)</option>
                        <option value="full">دفع كامل</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">العملة *</label>
                    <select class="form-select" id="currency" required onchange="updateSummary()">
                        <option value="YER">ريال يمني (ر.ي)</option>
                        <option value="SAR">ريال سعودي (ر.س)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">رسوم الشحن</label>
                    <input type="number" class="form-input" id="shipping" value="0" min="0" step="0.01">
                </div>
            </div>

            <!-- ملخص الطلب -->
            <div class="order-summary">
                <h2 class="section-title">
                    <i class="fas fa-receipt"></i>
                    <span>ملخص الطلب</span>
                </h2>

                <div class="summary-row">
                    <span class="summary-label">إجمالي المنتجات:</span>
                    <span class="summary-value" id="subtotal">0 ر.س</span>
                </div>

                <div class="summary-row">
                    <span class="summary-label">رسوم الشحن:</span>
                    <span class="summary-value" id="shippingDisplay">0 ر.س</span>
                </div>

                <div class="summary-row">
                    <span class="summary-label">المجموع الكلي:</span>
                    <span class="summary-value" id="total">0 ر.س</span>
                </div>
            </div>

            <!-- زر الإرسال -->
            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fas fa-check"></i>
                <span>إنشاء الطلب</span>
            </button>
        </form>
    </div>

    <!-- Modal اختيار المنتج -->
    <div class="product-select-modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">اختر منتج</h3>
                <button type="button" class="close-modal" onclick="closeProductSelect()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="product-list" id="productsSelectList">
                <!-- سيتم ملؤه ديناميكياً -->
            </div>
        </div>
    </div>

    <!-- الإشعارات -->
    <div class="notification" id="notification"></div>

    <!-- API Script -->
    <script src="../js/api.js"></script>

    <script>
        let selectedProducts = [];
        let allProducts = [];

        // تحميل المنتجات
        async function loadProducts() {
            try {
                if (!window.API || !window.API.products) {
                    console.warn('API not available');
                    return;
                }

                const response = await window.API.products.getAll();
                allProducts = response.data || response.products || [];
                
                // عرض المنتجات في Modal
                displayProductsInModal();
            } catch (error) {
                console.error('Error loading products:', error);
                showNotification('حدث خطأ في تحميل المنتجات', 'error');
            }
        }

        // عرض المنتجات في Modal
        function displayProductsInModal() {
            const list = document.getElementById('productsSelectList');
            if (!list) return;

            if (allProducts.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 20px;">لا توجد منتجات متاحة</p>';
                return;
            }

            const sym = getCurrencySymbol();
            list.innerHTML = allProducts
                .filter(p => p.status === 'active')
                .map(product => `
                    <div class="product-option" onclick="selectProduct('${product._id}')">
                        <div class="product-option-name">${product.name}</div>
                        <div class="product-option-price">${product.price} ${sym}</div>
                    </div>
                `).join('');
        }

        // فتح Modal اختيار المنتج
        function openProductSelect() {
            document.getElementById('productModal').classList.add('active');
        }

        // إغلاق Modal
        function closeProductSelect() {
            document.getElementById('productModal').classList.remove('active');
        }

        // اختيار منتج
        function selectProduct(productId) {
            const product = allProducts.find(p => p._id === productId);
            if (!product) return;

            // إضافة المنتج للقائمة
            selectedProducts.push({
                product: productId,
                name: product.name,
                price: product.price,
                quantity: 1
            });

            renderProductsList();
            updateSummary();
            closeProductSelect();
        }

        // عرض قائمة المنتجات المختارة
        function renderProductsList() {
            const list = document.getElementById('productsList');
            if (!list) return;

            if (selectedProducts.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 20px;">لم يتم اختيار منتجات بعد</p>';
                return;
            }

            const sym = getCurrencySymbol();
            list.innerHTML = selectedProducts.map((item, index) => `
                <div class="product-item">
                    <div class="product-item-header">
                        <span class="product-name">${item.name}</span>
                        <button type="button" class="remove-product" onclick="removeProduct(${index})">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="quantity-price">
                        <div class="form-group">
                            <label class="form-label">الكمية</label>
                            <input type="number" class="form-input" value="${item.quantity}" min="1" 
                                   onchange="updateProductQuantity(${index}, this.value)">
                        </div>
                        <div class="form-group">
                            <label class="form-label">السعر (${sym})</label>
                            <input type="number" class="form-input" value="${item.price}" min="0" step="0.01"
                                   onchange="updateProductPrice(${index}, this.value)">
                        </div>
                    </div>
                    <div style="margin-top: 10px; color: var(--gold-primary); font-weight: bold;">
                        المجموع: ${(item.quantity * item.price).toFixed(2)} ${sym}
                    </div>
                </div>
            `).join('');
        }

        // إزالة منتج
        function removeProduct(index) {
            selectedProducts.splice(index, 1);
            renderProductsList();
            updateSummary();
        }

        // تحديث كمية منتج
        function updateProductQuantity(index, quantity) {
            selectedProducts[index].quantity = parseInt(quantity) || 1;
            renderProductsList();
            updateSummary();
        }

        // تحديث سعر منتج
        function updateProductPrice(index, price) {
            selectedProducts[index].price = parseFloat(price) || 0;
            renderProductsList();
            updateSummary();
        }

        // الحصول على رمز العملة
        function getCurrencySymbol() {
            const currency = document.getElementById('currency').value;
            return currency === 'SAR' ? 'ر.س' : 'ر.ي';
        }

        // تحديث الملخص
        function updateSummary() {
            const subtotal = selectedProducts.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = parseFloat(document.getElementById('shipping').value) || 0;
            const total = subtotal + shipping;
            const sym = getCurrencySymbol();

            document.getElementById('subtotal').textContent = subtotal.toFixed(2) + ' ' + sym;
            document.getElementById('shippingDisplay').textContent = shipping.toFixed(2) + ' ' + sym;
            document.getElementById('total').textContent = total.toFixed(2) + ' ' + sym;

            // تحديث المنتجات المعروضة لتعكس العملة
            renderProductsList();
        }

        // إرسال الطلب
        document.getElementById('createOrderForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // التحقق من البيانات
            if (selectedProducts.length === 0) {
                showNotification('يرجى إضافة منتج واحد على الأقل', 'error');
                return;
            }

            const customerName = document.getElementById('customerName').value;
            const customerPhone = document.getElementById('customerPhone').value;

            if (!customerName || !customerPhone) {
                showNotification('يرجى ملء بيانات العميل المطلوبة', 'error');
                return;
            }

            const button = document.getElementById('submitBtn');
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>جاري إنشاء الطلب...</span>';

            try {
                // إعداد بيانات الطلب
                const orderData = {
                    customer: {
                        name: customerName,
                        phone: customerPhone,
                        country: document.getElementById('customerCountry').value || 'اليمن',
                        region: document.getElementById('customerRegion').value || '',
                        address: document.getElementById('customerAddress').value || '',
                        notes: document.getElementById('orderNotes').value || ''
                    },
                    items: selectedProducts.map(item => ({
                        product: item.product,
                        name: item.name,
                        price: item.price,
                        quantity: item.quantity
                    })),
                    total: selectedProducts.reduce((sum, item) => sum + (item.price * item.quantity), 0),
                    currency: document.getElementById('currency').value,
                    paymentMethod: document.getElementById('paymentMethod').value,
                    shipping: parseFloat(document.getElementById('shipping').value) || 0
                };

                // إرسال للـ API
                const response = await window.API.orders.create(orderData);

                if (response.success) {
                    showNotification(`تم إنشاء الطلب بنجاح! رقم الطلب: ${response.order.orderId}`, 'success');
                    
                    // إعادة تعيين النموذج بعد 2 ثانية
                    setTimeout(() => {
                        document.getElementById('createOrderForm').reset();
                        selectedProducts = [];
                        renderProductsList();
                        updateSummary();
                        button.disabled = false;
                        button.innerHTML = '<i class="fas fa-check"></i> <span>إنشاء الطلب</span>';
                        
                        // السؤال عن إنشاء طلب جديد
                        if (confirm('تم إنشاء الطلب بنجاح! هل تريد إنشاء طلب جديد؟')) {
                            // البقاء في الصفحة
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 2000);
                } else {
                    throw new Error(response.message || 'فشل إنشاء الطلب');
                }
            } catch (error) {
                console.error('Error creating order:', error);
                showNotification(error.message || 'حدث خطأ في إنشاء الطلب', 'error');
                button.disabled = false;
                button.innerHTML = '<i class="fas fa-check"></i> <span>إنشاء الطلب</span>';
            }
        });

        // عرض الإشعارات
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type} show`;

            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // تحديث الملخص عند تغيير الشحن
        document.getElementById('shipping').addEventListener('input', updateSummary);

        // إغلاق Modal عند الضغط خارجها
        document.getElementById('productModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeProductSelect();
            }
        });

        // تهيئة الصفحة
        document.addEventListener('DOMContentLoaded', async function() {
            // تحميل API إذا لم يكن متاحاً
            if (!window.API) {
                const script = document.createElement('script');
                script.src = '../js/api.js';
                document.head.appendChild(script);
                
                await new Promise(resolve => {
                    script.onload = resolve;
                    setTimeout(resolve, 2000);
                });
            }

            await loadProducts();
            renderProductsList();
            updateSummary();
        });
    </script>

    <style>
        /* شريط التنقل السفلي الموحد - إدارة */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            background: rgba(45, 38, 18, 0.98);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
            border-top: 2px solid rgba(212, 175, 55, 0.4);
            z-index: 1000;
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.6);
        }
        .bottom-nav .nav-item {
