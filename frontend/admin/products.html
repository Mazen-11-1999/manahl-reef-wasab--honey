<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنتجات | لوحة التحكم</title>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ألوان أساسية مخصصة */
            --royal-gold: #f4c025;      /* ذهبي ملكي (Primary) */
            --cream-gold: #fff4d1;      /* ذهبي كريمي (Accent Gold - نص فاتح) */
            --dark-brown: #221e10;      /* بني داكن (Background-light) */
            --velvet-brown: #1a1608;    /* بني مخملي أغمق (Background-dark) */
            --deep-brown: #2d2612;      /* بني عميق (Deep Brown - خلفية البطاقات) */

            /* ألوان إضافية */
            --dark-gold: #b8860b;       /* ذهبي داكن */
            --brown-gold: #493f22;      /* بني ذهبي */

            /* ألوان ثانوية وحالات */
            --gold-15: rgba(244, 192, 37, 0.15);    /* حدود شفافة */
            --gold-20: rgba(244, 192, 37, 0.20);    /* حدود */
            --gold-10: rgba(244, 192, 37, 0.10);    /* خلفيات */
            --gold-40: rgba(244, 192, 37, 0.40);    /* حدود */
            --gold-60: rgba(244, 192, 37, 0.60);    /* نص باهت */
            --red-logout: rgba(255, 0, 0, 0.4);     /* أحمر لتسجيل الخروج */

            /* ألوان النظام - للتوافق */
            --bg-primary: var(--velvet-brown);
            --bg-secondary: var(--dark-brown);
            --bg-card: var(--deep-brown);
            --bg-accent: var(--dark-brown);
            --gold-primary: var(--royal-gold);
            --gold-light: var(--cream-gold);
            --text-primary: var(--cream-gold);
            --text-secondary: var(--cream-gold);
            --text-white: #ffffff;
            --border-gold: var(--gold-20);
            --shadow-gold: var(--gold-20);
            --success: #51cf66;
            --danger: #ff6b6b;
            --warning: #ffd43b;
            --info: #74c0fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
            color: var(--text-primary);
            font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(145deg, var(--bg-accent), var(--bg-card));
            padding: 20px 15px;
            text-align: center;
            border-bottom: 2px solid var(--gold-primary);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .back-button {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--border-gold);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--gold-primary);
            text-decoration: none;
            font-size: 1.2rem;
        }

        .back-button:hover {
            background: var(--gold-primary);
            color: var(--bg-primary);
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 5px 15px var(--shadow-gold);
        }

        .header-title {
            color: var(--gold-primary);
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px var(--shadow-gold);
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 auto;
        }

        .admin-badge {
            background: var(--danger);
            color: white;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold-primary);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .page-title {
            color: var(--gold-primary);
            font-size: 1.8rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .view-all-btn {
            background: var(--gold-primary);
            color: var(--bg-primary);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .view-all-btn:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--shadow-gold);
        }

        .product-form {
            background: linear-gradient(145deg, var(--bg-card), var(--bg-accent));
            border: 1px solid var(--border-gold);
            border-radius: 20px;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .product-form::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--gold-primary) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.05;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            50% {
                transform: translate(-10px, -10px) rotate(180deg);
            }
        }

        .upload-section {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
        }

        .upload-area {
            width: 100%;
            height: 200px;
            border: 2px dashed var(--gold-primary);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--gold-primary);
            cursor: pointer;
            background: var(--bg-primary);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: var(--gold-light);
            background: rgba(212, 175, 55, 0.05);
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: var(--gold-light);
            background: rgba(212, 175, 55, 0.1);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .upload-text {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .upload-hint {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 5px;
        }

        .image-preview {
            display: none;
            width: 100%;
            height: 200px;
            border-radius: 15px;
            object-fit: cover;
            border: 2px solid var(--gold-primary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-primary);
            border: 1px solid var(--border-gold);
            color: var(--text-white);
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px var(--shadow-gold);
        }

        .form-input::placeholder {
            color: #666;
        }

        .form-input.price-old {
            color: #888;
            text-decoration: line-through;
        }

        .form-input.price-new {
            border-color: var(--gold-primary);
            border-width: 2px;
        }

        .form-input[readonly] {
            background: var(--bg-accent);
            color: #aaa;
            cursor: not-allowed;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(212, 175, 55, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            position: relative;
            z-index: 2;
        }

        .checkbox-input {
            width: 24px;
            height: 24px;
            accent-color: var(--gold-primary);
            cursor: pointer;
        }

        .checkbox-label {
            color: var(--gold-primary);
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            position: relative;
            z-index: 2;
        }

        .btn-primary {
            flex: 2;
            padding: 18px 30px;
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-light));
            border: none;
            border-radius: 15px;
            color: var(--bg-primary);
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--shadow-gold);
        }

        .btn-secondary {
            flex: 1;
            padding: 18px 30px;
            background: #444;
            color: var(--text-white);
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-secondary:hover {
            background: #555;
            transform: translateY(-2px);
        }

        .products-list {
            margin-top: 40px;
            background: linear-gradient(145deg, var(--bg-card), var(--bg-accent));
            border: 1px solid var(--border-gold);
            border-radius: 20px;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .products-list::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--gold-primary) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.05;
            animation: float 20s ease-in-out infinite reverse;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
            z-index: 2;
        }

        .list-title {
            color: var(--gold-primary);
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .product-count {
            background: rgba(212, 175, 55, 0.2);
            color: var(--gold-primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            position: relative;
            z-index: 2;
        }

        .product-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-gold);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold-primary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .product-image {
            width: 100%;
            height: 150px;
            background: var(--bg-accent);
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold-primary);
            font-size: 3rem;
            border: 1px solid var(--border-gold);
        }

        .product-info {
            margin-bottom: 15px;
        }

        .product-name {
            color: var(--text-white);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .product-category {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .product-price {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .price-current {
            color: var(--gold-primary);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .price-old {
            color: #888;
            text-decoration: line-through;
            font-size: 0.9rem;
        }

        .product-stock {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .stock-badge {
            background: var(--success);
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .stock-badge.low {
            background: var(--warning);
        }

        .stock-badge.out {
            background: var(--danger);
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .edit-btn {
            background: var(--info);
            color: white;
        }

        .delete-btn {
            background: var(--danger);
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .sale-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--danger);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 10px;
            }

            .page-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px 10px;
            }

            .product-form {
                padding: 20px;
            }

            .products-list {
                padding: 20px;
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-content">
            <a href="dashboard.html" class="back-button" title="العودة للوحة التحكم">
                <i class="fas fa-arrow-right"></i>
            </a>
            <h1 class="header-title">
                <i class="fas fa-box"></i>
                <span>إدارة المنتجات</span>
            </h1>
        </div>
    </header>

    <div class="container">

        <div class="page-header fade-in">
            <h2 class="page-title">
                <span>🚀</span>
                <span>إضافة منتج  جديد</span>
            </h2>
            <a href="#" class="view-all-btn" onclick="showProductsList()">
                <span>👁️</span>
                <span>عرض كل المنتجات</span>
            </a>
        </div>

        <div class="product-form fade-in">

            <div class="upload-section">
                <div class="upload-area" id="uploadArea" onclick="document.getElementById('productImage').click()">
                    <div class="upload-icon">📸</div>
                    <div class="upload-text">اضغط لرفع صورة المنتج</div>
                    <div class="upload-hint">أو اسحب وأفلت الصورة هنا</div>
                </div>
                <img class="image-preview" id="imagePreview" alt="صورة المنتج">
                <input type="file" id="productImage" accept="image/*" style="display: none;">
            </div>

            <div class="form-grid">

                <div class="form-group full-width">
                    <label class="form-label">اسم المنتج</label>
                    <input type="text" class="form-input" id="productName" placeholder="مثال: عسل سدر ملكي وصابي">
                </div>

                <div class="form-group">
                    <label class="form-label">فئة المنتج</label>
                    <select class="form-select" id="productCategory">
                        <option value="">جاري تحميل الفئات...</option>
                    </select>
                    <a href="categories.html" style="color: var(--gold-primary); font-size: 0.8rem; margin-top: 5px; display: inline-block; text-decoration: none;">
                        <i class="fas fa-plus-circle"></i> إدارة الفئات
                    </a>
                </div>

                <div class="form-group">
                    <label class="form-label">الحجم/الوزن</label>
                    <input type="text" class="form-input" id="productSize" placeholder="مثال: 1 كجم">
                </div>

                <div class="form-group">
                    <label class="form-label">السعر القديم (قبل الخصم)</label>
                    <input type="number" class="form-input price-old" id="oldPrice" placeholder="0.00" step="0.01">
                </div>

                <div class="form-group">
                    <label class="form-label">السعر الجديد (الحالي)</label>
                    <input type="number" class="form-input price-new" id="newPrice" placeholder="0.00" step="0.01">
                </div>

                <div class="form-group">
                    <label class="form-label">الكمية المتوفرة (المخزون)</label>
                    <input type="number" class="form-input" id="stockQuantity" placeholder="مثال: 50">
                </div>

                <div class="form-group">
                    <label class="form-label">تاريخ الإضافة</label>
                    <input type="text" class="form-input" id="addDate" readonly>
                </div>

                <div class="form-group full-width">
                    <label class="form-label">وصف المنتج</label>
                    <textarea class="form-input" id="productDescription" rows="3"
                        placeholder="وصف تفصيلي للمنتج..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">رمز المنتج (SKU)</label>
                    <input type="text" class="form-input" id="productSKU" placeholder="مثال: HONEY-001">
                </div>

                <div class="form-group">
                    <label class="form-label">الحد الأدنى للطلب</label>
                    <input type="number" class="form-input" id="minOrder" placeholder="مثال: 1" value="1">
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" class="checkbox-input" id="onSale">
                <label for="onSale" class="checkbox-label">تفعيل شارة "خصم خاص" على المنتج</label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" class="checkbox-input" id="featured" checked>
                <label for="featured" class="checkbox-label">عرض المنتج في قسم "المنتجات المميزة"</label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" class="checkbox-input" id="inStock" checked>
                <label for="inStock" class="checkbox-label">المنتج متاح للشراء</label>
            </div>

            <div class="form-actions">
                <button class="btn-primary" onclick="publishProduct()">
                    <span>🚀</span>
                    <span>نشر المنتج في المتجر</span>
                </button>
                <button class="btn-secondary" onclick="saveDraft()">
                    <span>💾</span>
                    <span>حفظ كمسودة</span>
                </button>
            </div>

        </div>

        <!-- قائمة المنتجات -->
        <div class="products-list fade-in" id="productsList" style="display: none;">
            <div class="list-header">
                <h3 class="list-title">
                    <span>📦</span>
                    <span>المنتجات الحالية</span>
                </h3>
                <div class="product-count" id="productCount">0 منتجات</div>
            </div>

            <div class="products-grid" id="productsGrid">
                <!-- سيتم إضافة المنتجات هنا ديناميكياً -->
            </div>
        </div>

    </div>

    <!-- API Integration -->
    <script src="../js/api.js"></script>

    <script>
        // تحميل المنتجات من قاعدة البيانات
        let products = [];
        let editingProductId = null; // لتتبع المنتج المراد تعديله
        let selectedImageFile = null; // ملف الصورة المختار

        // تعيين تاريخ اليوم
        document.getElementById('addDate').value = new Date().toISOString().split('T')[0];

        // معالجة رفع الصورة
        const uploadArea = document.getElementById('uploadArea');
        const productImage = document.getElementById('productImage');
        const imagePreview = document.getElementById('imagePreview');

        // السحب والإفلات
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');

            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                handleImageUpload(files[0]);
            }
        });

        productImage.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleImageUpload(e.target.files[0]);
            }
        });

        function handleImageUpload(file) {
            selectedImageFile = file; // حفظ الملف للرفع لاحقاً
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                uploadArea.style.display = 'none';
                showNotification('تم اختيار الصورة بنجاح', 'success');
            };
            reader.readAsDataURL(file);
        }

        // جمع بيانات المنتج من النموذج
        function getProductFormData() {
            const inStockChecked = document.getElementById('inStock').checked;
            return {
                name: document.getElementById('productName').value,
                category: document.getElementById('productCategory').value,
                size: document.getElementById('productSize').value,
                oldPrice: document.getElementById('oldPrice').value || 0,
                price: document.getElementById('newPrice').value,
                stock: document.getElementById('stockQuantity').value,
                description: document.getElementById('productDescription').value,
                sku: document.getElementById('productSKU').value,
                minOrder: document.getElementById('minOrder').value || 1,
                onSale: document.getElementById('onSale').checked,
                featured: document.getElementById('featured').checked,
                inStock: inStockChecked,
                isActive: inStockChecked
            };
        }

        // نشر المنتج - إرسال حقيقي إلى API
        async function publishProduct() {
            const productData = getProductFormData();

            // التحقق من الحقول المطلوبة
            if (!productData.name || !productData.price || !productData.stock) {
                showNotification('يرجى ملء الحقول المطلوبة (الاسم، السعر، المخزون)', 'warning');
                return;
            }

            try {
                showNotification('جارٍ حفظ المنتج...', 'info');

                let result;
                if (editingProductId) {
                    // تعديل منتج موجود
                    result = await window.API.products.update(editingProductId, productData, selectedImageFile);
                    editingProductId = null;
                    showNotification('✅ تم تعديل المنتج بنجاح!', 'success');
                } else {
                    // إضافة منتج جديد
                    result = await window.API.products.create(productData, selectedImageFile);
                    showNotification('✅ تم نشر المنتج بنجاح! سيظهر في الصفحة الرئيسية', 'success');
                }

                resetForm();
                await loadProductsFromAPI();
            } catch (error) {
                console.error('Error saving product:', error);
                showNotification('❌ حدث خطأ: ' + error.message, 'error');
            }
        }

        // حفظ كمسودة
        async function saveDraft() {
            const productData = getProductFormData();
            productData.isActive = false; // المسودة غير منشورة

            try {
                showNotification('جارٍ حفظ المسودة...', 'info');
                await window.API.products.create(productData, selectedImageFile);
                showNotification('✅ تم حفظ المنتج كمسودة', 'info');
                resetForm();
                await loadProductsFromAPI();
            } catch (error) {
                console.error('Error saving draft:', error);
                showNotification('❌ حدث خطأ: ' + error.message, 'error');
            }
        }

        // تحميل المنتجات من API
        async function loadProductsFromAPI() {
            try {
                const response = await window.API.products.getAll();
                products = response.data || response.products || (Array.isArray(response) ? response : []);
                updateProductsList();
            } catch (error) {
                console.error('Error loading products:', error);
                // محاولة تحميل مباشرة بدون api.js
                try {
                    const res = await fetch('/api/products');
                    const data = await res.json();
                    products = data.data || data.products || [];
                    updateProductsList();
                } catch (e) {
                    showNotification('⚠️ تعذر تحميل المنتجات. تأكد من تشغيل السيرفر', 'warning');
                }
            }
        }

        // إعادة تعيين النموذج
        function resetForm() {
            document.getElementById('productName').value = '';
            document.getElementById('productSize').value = '';
            document.getElementById('oldPrice').value = '';
            document.getElementById('newPrice').value = '';
            document.getElementById('stockQuantity').value = '';
            document.getElementById('productDescription').value = '';
            document.getElementById('productSKU').value = '';
            document.getElementById('minOrder').value = '1';
            document.getElementById('onSale').checked = false;
            document.getElementById('featured').checked = true;
            document.getElementById('inStock').checked = true;

            imagePreview.style.display = 'none';
            uploadArea.style.display = 'flex';
            imagePreview.src = '';
            selectedImageFile = null;
            editingProductId = null;
        }

        // عرض قائمة المنتجات
        function showProductsList() {
            const productsList = document.getElementById('productsList');
            productsList.style.display = productsList.style.display === 'none' ? 'block' : 'none';
            loadProductsFromAPI();
        }

        // تحديث قائمة المنتجات
        function updateProductsList() {
            const productsGrid = document.getElementById('productsGrid');
            const productCount = document.getElementById('productCount');

            productCount.textContent = `${products.length} منتجات`;

            if (products.length === 0) {
                productsGrid.innerHTML = '<div style="text-align:center; padding:40px; color:var(--cream-gold); grid-column:1/-1;"><i class="fas fa-box-open" style="font-size:3rem; margin-bottom:15px; opacity:0.3;"></i><p>لا توجد منتجات بعد. أضف أول منتج!</p></div>';
                return;
            }

            productsGrid.innerHTML = products.map(product => {
                const productId = product._id || product.id;
                const productImage = product.image || product.images?.[0];
                const productPrice = product.price || product.newPrice;
                const productOldPrice = product.oldPrice || product.comparePrice;
                const productStock = product.stock || product.quantity || 0;
                
                return `
                <div class="product-card">
                    ${product.onSale ? '<div class="sale-badge">خصم خاص</div>' : ''}
                    <div class="product-image">
                        ${productImage ? `<img src="${productImage}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 10px;" onerror="this.parentElement.innerHTML='🍯'">` : '🍯'}
                    </div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-category">${getCategoryName(product.category)}</div>
                        <div class="product-price">
                            <span class="price-current">${productPrice} ريال</span>
                            ${productOldPrice ? `<span class="price-old">${productOldPrice} ريال</span>` : ''}
                        </div>
                        <div class="product-stock">
                            <span>المخزون:</span>
                            <span class="stock-badge ${getStockClass(productStock)}">${productStock} قطعة</span>
                        </div>
                        <div style="margin-top:5px; font-size:0.8rem; color: ${product.isActive !== false ? 'var(--success)' : 'var(--warning)'}">
                            ${product.isActive !== false ? '● منشور' : '● مسودة'}
                        </div>
                    </div>
                    <div class="product-actions">
                        <button class="action-btn edit-btn" onclick="editProduct('${productId}')">
                            <span>✏️</span>
                            <span>تعديل</span>
                        </button>
                        <button class="action-btn delete-btn" onclick="deleteProduct('${productId}')">
                            <span>🗑️</span>
                            <span>حذف</span>
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        // تحميل الفئات من API في قائمة المنتجات
        let categoriesMap = {};
        async function loadCategoriesForSelect() {
            try {
                const data = await window.API.categories.getAll();
                const cats = data.data || data.categories || [];
                const select = document.getElementById('productCategory');
                
                if (cats.length > 0) {
                    select.innerHTML = '<option value="">اختر الفئة</option>';
                    cats.forEach(cat => {
                        categoriesMap[cat.slug] = cat.name;
                        categoriesMap[cat._id] = cat.name;
                        select.innerHTML += `<option value="${cat.slug}">${cat.icon || '📦'} ${cat.name}</option>`;
                    });
                } else {
                    // فئات افتراضية إذا لم توجد فئات في قاعدة البيانات
                    select.innerHTML = `
                        <option value="">اختر الفئة</option>
                        <option value="honey-sidr">🍯 عسل سدر</option>
                        <option value="honey-sumra">🍯 عسل سمرة</option>
                        <option value="therapeutic-mix">💊 خلطات علاجية</option>
                        <option value="bee-products">🐝 منتجات النحل</option>
                        <option value="oils">🫒 زيوت طبيعية</option>
                        <option value="other">📦 أخرى</option>
                    `;
                }
            } catch (error) {
                console.warn('تعذر تحميل الفئات:', error);
                // فئات افتراضية
                const select = document.getElementById('productCategory');
                select.innerHTML = `
                    <option value="">اختر الفئة</option>
                    <option value="honey-sidr">🍯 عسل سدر</option>
                    <option value="honey-sumra">🍯 عسل سمرة</option>
                    <option value="therapeutic-mix">💊 خلطات علاجية</option>
                    <option value="other">📦 أخرى</option>
                `;
            }
        }

        // الحصول على اسم الفئة
        function getCategoryName(category) {
            if (categoriesMap[category]) return categoriesMap[category];
            const fallback = {
                'honey-sidr': 'عسل سدر',
                'honey-sumra': 'عسل سمرة',
                'therapeutic-mix': 'خلطات علاجية',
                'bee-products': 'منتجات النحل',
                'royal-jelly': 'غذاء الملكات',
                'pollen': 'حبوب اللقاح',
                'propolis': 'بروبوليس',
                'oils': 'زيوت طبيعية'
            };
            return fallback[category] || category || 'عام';
        }

        // الحصول على فئة المخزون
        function getStockClass(stock) {
            const stockNum = parseInt(stock);
            if (stockNum === 0) return 'out';
            if (stockNum < 10) return 'low';
            return '';
        }

        // تعديل المنتج - تحميل بياناته من API
        async function editProduct(id) {
            try {
                const product = products.find(p => (p._id || p.id) === id);
                if (product) {
                    document.getElementById('productName').value = product.name || '';
                    document.getElementById('productCategory').value = product.category || '';
                    document.getElementById('productSize').value = product.size || '';
                    document.getElementById('oldPrice').value = product.oldPrice || product.comparePrice || '';
                    document.getElementById('newPrice').value = product.price || product.newPrice || '';
                    document.getElementById('stockQuantity').value = product.stock || product.quantity || '';
                    document.getElementById('productDescription').value = product.description || '';
                    document.getElementById('productSKU').value = product.sku || '';
                    document.getElementById('minOrder').value = product.minOrder || '1';
                    document.getElementById('onSale').checked = !!product.onSale;
                    document.getElementById('featured').checked = product.featured !== false;
                    document.getElementById('inStock').checked = product.isActive !== false;

                    const productImage = product.image || product.images?.[0];
                    if (productImage) {
                        imagePreview.src = productImage;
                        imagePreview.style.display = 'block';
                        uploadArea.style.display = 'none';
                    }

                    editingProductId = id; // حفظ ID للتعديل
                    showNotification('تم تحميل المنتج للتعديل - اضغط "نشر" بعد التعديل', 'info');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            } catch (error) {
                console.error('Error loading product for edit:', error);
                showNotification('❌ حدث خطأ في تحميل المنتج', 'error');
            }
        }

        // حذف المنتج - حذف حقيقي من قاعدة البيانات
        async function deleteProduct(id) {
            if (confirm('هل أنت متأكد من حذف هذا المنتج؟ لا يمكن التراجع!')) {
                try {
                    await window.API.products.delete(id);
                    showNotification('✅ تم حذف المنتج من قاعدة البيانات', 'success');
                    await loadProductsFromAPI();
                } catch (error) {
                    console.error('Error deleting product:', error);
                    showNotification('❌ حدث خطأ في الحذف: ' + error.message, 'error');
                }
            }
        }

        // نظام الإشعارات
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: ${type === 'success' ? 'var(--success)' :
                    type === 'warning' ? 'var(--warning)' :
                        type === 'error' ? 'var(--danger)' : 'var(--info)'};
                color: white;
                padding: 15px 25px;
                border-radius: 25px;
                font-weight: bold;
                z-index: 10000;
                box-shadow: 0 5px 15px rgba(0,0,0,0.3);
                animation: slideDown 0.3s ease-out;
                font-family: 'Tajawal', sans-serif;
                max-width: 90%;
                text-align: center;
            `;
            notification.textContent = message;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideUp 0.3s ease-out';
                setTimeout(() => {
                    if (notification.parentNode) notification.parentNode.removeChild(notification);
                }, 300);
            }, 3000);
        }

        // إضافة أنماط الإشعارات
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from { transform: translate(-50%, -100%); opacity: 0; }
                to { transform: translate(-50%, 0); opacity: 1; }
            }
            @keyframes slideUp {
                from { transform: translate(-50%, 0); opacity: 1; }
                to { transform: translate(-50%, -100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // تهيئة الصفحة - تحميل المنتجات من API
        document.addEventListener('DOMContentLoaded', async function () {
            // انتظار تحميل api.js
            const waitForAPI = () => new Promise(resolve => {
                if (window.API) return resolve();
                const check = setInterval(() => {
                    if (window.API) { clearInterval(check); resolve(); }
                }, 100);
                setTimeout(() => { clearInterval(check); resolve(); }, 3000);
            });

            await waitForAPI();
            await loadCategoriesForSelect();
            await loadProductsFromAPI();

            // فتح تعديل منتج من الرابط ?edit=ID (من لوحة التحكم)
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('edit');
            if (editId && typeof editProduct === 'function') {
                const product = products.find(p => (p._id || p.id) === editId);
                if (product) {
                    editProduct(editId);
                } else {
                    try {
                        const res = await window.API.products.getById(editId);
                        const p = res.product || res.data || res;
                        if (p) {
                            products.push(p);
                            editProduct(editId);
                        }
                    } catch (e) {
                        console.warn('Could not load product for edit:', e);
                    }
                }
            }

            // تأثيرات التمرير
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.animation = 'fadeIn 0.6s ease-out';
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.product-form, .products-list').forEach(element => {
                observer.observe(element);
            });
        });
    </script>
