<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض قصتنا | لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-gold: #f4c025;
            --cream-gold: #fff4d1;
            --dark-brown: #221e10;
            --velvet-brown: #1a1608;
            --deep-brown: #2d2612;
            --gold-20: rgba(244, 192, 37, 0.20);
            --success: #51cf66;
            --danger: #ff6b6b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, var(--velvet-brown), var(--dark-brown));
            color: var(--cream-gold);
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            padding-bottom: 90px;
        }
        header {
            background: linear-gradient(145deg, var(--deep-brown), var(--velvet-brown));
            padding: 20px 15px;
            border-bottom: 2px solid var(--royal-gold);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .back-button {
            background: rgba(212,175,55,0.1);
            border: 1px solid var(--gold-20);
            color: var(--royal-gold);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .back-button:hover { background: var(--royal-gold); color: var(--velvet-brown); transform: scale(1.05); }
        .header-title {
            color: var(--royal-gold);
            font-size: 1.4rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 24px 15px; }
        .card {
            background: linear-gradient(145deg, var(--deep-brown), var(--velvet-brown));
            border: 1px solid var(--gold-20);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .card h2 {
            color: var(--royal-gold);
            font-size: 1.2rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card p {
            color: var(--cream-gold);
            opacity: 0.9;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }
        .upload-zone {
            border: 2px dashed var(--royal-gold);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            background: rgba(244,192,37,0.05);
            margin-bottom: 20px;
        }
        .upload-zone input[type="file"] {
            display: block;
            margin: 0 auto 12px;
            color: var(--cream-gold);
            font-size: 0.9rem;
        }
        .upload-zone .hint {
            font-size: 0.85rem;
            opacity: 0.8;
        }
        .gallery-preview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .gallery-preview .item {
            aspect-ratio: 4/3;
            border-radius: 12px;
            overflow: hidden;
            background: var(--velvet-brown);
            border: 1px solid var(--gold-20);
            position: relative;
        }
        .gallery-preview .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .gallery-preview .item .no-img {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--royal-gold);
            opacity: 0.5;
        }
        .caption-inputs {
            margin-top: 20px;
        }
        .caption-inputs label {
            display: block;
            color: var(--cream-gold);
            font-size: 0.9rem;
            margin-bottom: 6px;
        }
        .caption-inputs input {
            width: 100%;
            padding: 12px;
            background: var(--velvet-brown);
            border: 1px solid var(--gold-20);
            border-radius: 10px;
            color: var(--cream-gold);
            font-size: 1rem;
            margin-bottom: 12px;
        }
        .btn-save {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--royal-gold), var(--cream-gold));
            border: none;
            border-radius: 14px;
            color: var(--velvet-brown);
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(244,192,37,0.4); }
        .btn-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 24px;
            border-radius: 25px;
            font-weight: bold;
            z-index: 9999;
            animation: fadeIn 0.3s;
        }
        .toast.success { background: var(--success); color: #fff; }
        .toast.error { background: var(--danger); color: #fff; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(45,38,18,0.98);
            border-top: 2px solid rgba(212,175,55,0.4);
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }
        .bottom-nav .nav-item {
            color: #d4af37;
            text-align: center;
            font-size: 0.8rem;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .bottom-nav .nav-item i { font-size: 1.2rem; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="dashboard.html" class="back-button" title="العودة"><i class="fas fa-arrow-right"></i></a>
            <h1 class="header-title"><i class="fas fa-images"></i> معرض قصتنا</h1>
        </div>
    </header>
    <div class="container">
        <div class="card">
            <h2><i class="fas fa-info-circle"></i> صور صفحة «قصتنا»</h2>
            <p>اختر حتى 6 صور تظهر في معرض «جمال طبيعة وصاب» في صفحة قصتنا. يمكنك تغييرها في أي وقت من هاتفك.</p>
            <div class="upload-zone">
                <input type="file" id="galleryFiles" accept="image/*" multiple>
                <span class="hint">اختر من 1 إلى 6 صور (JPG, PNG, WebP)</span>
            </div>
            <div class="gallery-preview" id="galleryPreview"></div>
            <div class="caption-inputs" id="captionInputs"></div>
            <button type="button" class="btn-save" id="btnSave" disabled>
                <i class="fas fa-cloud-upload-alt"></i> حفظ صور المعرض
            </button>
        </div>
    </div>
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-crown"></i><span>لوحة التحكم</span></a>
        <a href="products.html" class="nav-item"><i class="fas fa-box-open"></i><span>المنتجات</span></a>
        <a href="story-gallery.html" class="nav-item" style="color:#f3cf7a;"><i class="fas fa-images"></i><span>معرض قصتنا</span></a>
    </nav>
    <script src="../js/api.js"></script>
    <script>
        (function() {
            const galleryFiles = document.getElementById('galleryFiles');
            const galleryPreview = document.getElementById('galleryPreview');
            const captionInputs = document.getElementById('captionInputs');
            const btnSave = document.getElementById('btnSave');

            const defaultCaptions = [
                'جبال وصاب الشاهقة',
                'مناحلنا في قلب الطبيعة',
                'حصاد يدوي تقليدي',
                'ذهب سائل نقي',
                'أشجار السدر المعمرة',
                'عبوات العسل الفاخرة'
            ];

            let selectedFiles = [];
            let currentGallery = [];

            function showToast(msg, type) {
                const el = document.createElement('div');
                el.className = 'toast ' + type;
                el.textContent = msg;
                document.body.appendChild(el);
                setTimeout(function() { el.remove(); }, 3000);
            }

            function renderPreview() {
                galleryPreview.innerHTML = '';
                for (let i = 0; i < 6; i++) {
                    const div = document.createElement('div');
                    div.className = 'item';
                    if (selectedFiles[i]) {
                        const img = document.createElement('img');
                        img.src = URL.createObjectURL(selectedFiles[i]);
                        img.alt = 'صورة ' + (i + 1);
                        div.appendChild(img);
                    } else if (currentGallery[i] && currentGallery[i].url) {
                        const img = document.createElement('img');
                        img.src = currentGallery[i].url.indexOf('/') === 0 ? (window.location.origin + currentGallery[i].url) : currentGallery[i].url;
                        img.alt = currentGallery[i].caption || '';
                        img.onerror = function() { div.innerHTML = '<div class="no-img">🍯</div>'; };
                        div.appendChild(img);
                    } else {
                        div.innerHTML = '<div class="no-img">🍯</div>';
                    }
                    galleryPreview.appendChild(div);
                }
            }

            function renderCaptions() {
                captionInputs.innerHTML = '';
                for (let i = 0; i < 6; i++) {
                    const label = document.createElement('label');
                    label.textContent = 'وصف الصورة ' + (i + 1) + ' (اختياري)';
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.name = 'caption' + i;
                    input.placeholder = defaultCaptions[i] || '';
                    input.value = (currentGallery[i] && currentGallery[i].caption) ? currentGallery[i].caption : '';
                    captionInputs.appendChild(label);
                    captionInputs.appendChild(input);
                }
            }

            galleryFiles.addEventListener('change', function() {
                const files = Array.from(this.files || []).slice(0, 6);
                selectedFiles = files;
                btnSave.disabled = files.length === 0;
                renderPreview();
            });

            btnSave.addEventListener('click', async function() {
                if (selectedFiles.length === 0) {
                    showToast('اختر صوراً أولاً', 'error');
                    return;
                }
                const formData = new FormData();
                for (let i = 0; i < selectedFiles.length; i++) formData.append('images', selectedFiles[i]);
                const captions = captionInputs.querySelectorAll('input[name^="caption"]');
                for (let i = 0; i < captions.length; i++) formData.append('caption' + i, captions[i].value || '');
                btnSave.disabled = true;
                btnSave.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الرفع...';
                try {
                    await window.API.siteSettings.uploadStoryGallery(formData);
                    showToast('تم حفظ صور المعرض بنجاح', 'success');
                    selectedFiles = [];
                    galleryFiles.value = '';
                    await loadCurrentGallery();
                    renderPreview();
                    renderCaptions();
                } catch (e) {
                    showToast(e.message || 'فشل الرفع', 'error');
                }
                btnSave.disabled = true;
                btnSave.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> حفظ صور المعرض';
            });

            async function loadCurrentGallery() {
                try {
                    const data = await window.API.siteSettings.get();
                    currentGallery = (data.settings && data.settings.storyGallery) ? data.settings.storyGallery : [];
                    if (currentGallery.length < 6) {
                        while (currentGallery.length < 6) currentGallery.push({ url: '', caption: '' });
                    }
                } catch (e) {
                    currentGallery = Array(6).fill(null).map(function() { return { url: '', caption: '' }; });
                }
                renderCaptions();
            }

            document.addEventListener('DOMContentLoaded', function() {
                const wait = setInterval(function() {
                    if (window.API) {
                        clearInterval(wait);
                        loadCurrentGallery();
                        renderPreview();
                    }
                }, 100);
                setTimeout(clearInterval, 5000, wait);
            });
        })();
    </script>
</body>
</html>
