        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #000;
            overflow: hidden;
            color: white;
        }

        .cinema-screen {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .cinematic-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9), inset 0 0 50px rgba(0,0,0,0.8);
        }

        .cinematic-bars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 11;
        }

        .cinematic-bars::before,
        .cinematic-bars::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 15%;
            background: linear-gradient(to bottom, rgba(0,0,0,1), rgba(0,0,0,0));
            z-index: 12;
        }

        .cinematic-bars::before {
            top: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,1), rgba(0,0,0,0.8), transparent);
        }

        .cinematic-bars::after {
            bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0.8), transparent);
        }

        .back-to-story {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 25;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: rgba(0,0,0,0.75);
            color: #FFD700;
            text-decoration: none;
            border-radius: 50px;
            border: 2px solid #FFD700;
            font-weight: bold;
            transition: all 0.3s;
            pointer-events: auto;
        }

        .back-to-story:hover {
            background: #FFD700;
            color: #000;
            transform: translateY(-2px);
        }

        .cinematic-title {
            position: absolute;
            top: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 20;
            pointer-events: none;
        }

        .cinematic-title h1 {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
            letter-spacing: 4px;
            margin-bottom: 10px;
            animation: titleGlow 3s ease-in-out infinite;
        }

        .cinematic-title p {
            color: rgba(255,255,255,0.8);
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 30px rgba(255,215,0,0.5); }
            50% { text-shadow: 0 0 60px rgba(255,215,0,0.8); }
        }

        .cinematic-info {
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 20;
            pointer-events: none;
        }

        .info-left {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border-left: 4px solid #FFD700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
        }

        .info-left h3 {
            color: #FFD700;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .info-left p {
            color: white;
            font-size: 1.1rem;
            margin: 5px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-left i {
            color: #FFD700;
            width: 25px;
        }

        .info-right {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border-right: 4px solid #FFD700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
            text-align: right;
        }

        .distance-badge {
            font-size: 3rem;
            font-weight: 900;
            color: #FFD700;
            line-height: 1;
        }

        .distance-label {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .progress-container {
            width: 300px;
            margin-top: 15px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            border-radius: 3px;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 20px;
            height: 100%;
            background: white;
            filter: blur(10px);
            animation: progressGlow 2s linear infinite;
        }

        @keyframes progressGlow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(500%); }
        }

        .control-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            color: black;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(255,215,0,0.5);
            transition: all 0.3s;
            border: 2px solid white;
            pointer-events: auto;
        }

        .control-btn:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 20px 40px rgba(255,215,0,0.8);
        }

        .control-btn.running {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1s;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 5px solid rgba(255,215,0,0.3);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #FFD700;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .location-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #4CAF50;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }
    </style>
</head>

            function calculateDistance(lat1, lon1, lat2, lon2) {
                var R = 6371;
                var dLat = (lat2 - lat1) * Math.PI / 180;
                var dLon = (lon2 - lon1) * Math.PI / 180;
                var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                         Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                         Math.sin(dLon/2) * Math.sin(dLon/2);
                var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return R * c;
            }

                if (index >= routePoints.length - 1) return routePoints[routePoints.length - 1];
                var p1 = routePoints[index], p2 = routePoints[index + 1];
                return [p1[0] + (p2[0] - p1[0]) * segmentProgress, p1[1] + (p2[1] - p1[1]) * segmentProgress];
            }

            var locationNames = [
                'صنعاء - المناحل', 'شارع تعز', 'جولة عصر', 'شارع الستين', 'جولة المصباحي',
                'بداية طريق تعز', 'منطقة خولان', 'جبال عيبان', 'وادي ظهر', 'مدخل الحيمة',
                'الحيمة الداخلية', 'منعطف جبلي', 'طريق جبلي', 'ممر ضيق', 'قمة جبلية',
                'منحدرات', 'وادي عميق', 'غابات كثيفة', 'منطقة حراز', 'مدخل ريمة',
                'جبال ريمة', 'قمم ريمة', 'وادي الرمة', 'سوق ريمة', 'منعطف وصاب',
                'بداية جبال وصاب', 'طريق متعرج', 'مرتفعات وصاب العالي', 'غابات السدر', 'وادي وصاب',
                'منعطف النحل', 'منطقة أثرية', 'قمم وصاب', 'مناحل تقليدية', 'وادي الذهب',
                'ممر النحالين', 'غابات السمر', 'مدخل وصاب السافل', 'أولى قرى وصاب', 'سوق وصاب',
                'مدرسة بني علي', 'مناحل ريف وصاب (فرع)', 'ممر بني علي', 'مرتفعات بني علي',
                'غابات السدر الكثيفة', 'وادي النحل', 'قرى بني علي', 'مدخل بني علي', 'مناحل ريف وصاب',
                'وادي العسل', 'سفوح الجبال', 'بساتين السدر', 'مرتفعات الجبل', 'مسجد بني علي',
                'مناحل ريف وصاب (مركز رئيسي)', 'بني علي - الوجهة النهائية'
            ];

            function updateAnimation(progress) {
                var currentPoint = getPointAtProgress(progress);
                carMarker.setLngLat([currentPoint[1], currentPoint[0]]);
                var pointsToShow = routePoints.slice(0, Math.floor(progress * routePoints.length) + 1);
                var coordinates = pointsToShow.map(function(p) { return [p[1], p[0]]; });
                var source = map.getSource('animated-route');
                if (source) {
                    source.setData({
                        type: 'Feature',
                        properties: {},
                        geometry: { type: 'LineString', coordinates: coordinates }
                    });
                }
                document.getElementById('distance-remaining').textContent = (totalDistance * (1 - progress)).toFixed(1);
                document.getElementById('route-progress').style.width = (progress * 100) + '%';
                var totalSeconds = 3 * 3600 + 45 * 60;
                var elapsedSeconds = Math.floor(totalSeconds * progress);
                var hours = Math.floor(elapsedSeconds / 3600);
                var minutes = Math.floor((elapsedSeconds % 3600) / 60);
                var seconds = elapsedSeconds % 60;
                document.getElementById('time-elapsed').textContent =
                    (hours < 10 ? '0' : '') + hours + ':' + (minutes < 10 ? '0' : '') + minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
                var nameIndex = Math.min(Math.floor(progress * locationNames.length), locationNames.length - 1);
                document.getElementById('current-location').textContent = locationNames[nameIndex] || 'بني علي';
                if (progress > 0.05 && progress < 0.95) {
                    map.flyTo({ center: [currentPoint[1], currentPoint[0]], zoom: 11, pitch: 55, duration: 1000 });
                }
            }

            function startJourney() {
                if (isAnimating) {
                    if (animationTimeline && animationTimeline.paused()) {
                        animationTimeline.resume();
                        document.getElementById('start-btn').innerHTML = '<i class="fas fa-pause"></i> إيقاف الرحلة';
                        document.getElementById('start-btn').classList.add('running');
                    } else if (animationTimeline) {
                        animationTimeline.pause();
                        document.getElementById('start-btn').innerHTML = '<i class="fas fa-play"></i> متابعة الرحلة';
                        document.getElementById('start-btn').classList.remove('running');
                    }
                    return;
                }

                isAnimating = true;
                map.flyTo({ center: [COORDS.start[1], COORDS.start[0]], zoom: 13, pitch: 60, duration: 3000 });

                animationTimeline = gsap ? gsap.timeline({
                    onUpdate: function() { updateAnimation(this.progress()); },
                    onComplete: function() {
                        map.flyTo({ center: [COORDS.end[1], COORDS.end[0]], zoom: 16, pitch: 65, duration: 3000 });
                        document.getElementById('start-btn').innerHTML = '<i class="fas fa-play"></i> بدء الرحلة';
                        document.getElementById('start-btn').classList.remove('running');
                        isAnimating = false;
                        if (typeof alert !== 'undefined') alert('🎉 وصلتم إلى مناحل ريف وصاب في بني علي! أهلاً بكم في مملكة العسل اليمني الأصيل! 🎉');
                    }
                }) : { to: function() {}, pause: function() {}, resume: function() {} };

                if (animationTimeline.to) {
                    animationTimeline.to({}, { duration: 25, ease: 'power1.inOut' });
                }

                document.getElementById('start-btn').innerHTML = '<i class="fas fa-pause"></i> إيقاف الرحلة';
                document.getElementById('start-btn').classList.add('running');
            }

            document.getElementById('start-btn').addEventListener('click', startJourney);
        })();
    </script>
</body>
</html>
