<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل | مناحل ريف وصاب</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #0a0600;
            --bg-card: #151008;
            --gold: #d4af37;
            --gold-light: #f3cf7a;
            --text: #e8dcc8;
            --text-muted: #9a8b6e;
            --danger: #e74c3c;
            --success: #27ae60;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(165deg, var(--bg-deep) 0%, #120a00 50%, #0d0800 100%);
            font-family: 'Cairo', sans-serif;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .offline-container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .offline-icon {
            font-size: 80px;
            color: var(--gold);
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }

        .offline-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 15px;
            font-family: 'Amiri', serif;
        }

        .offline-description {
            font-size: 18px;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .offline-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none;
            color: var(--bg-deep);
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text);
            border: 2px solid var(--gold);
        }

        .btn-secondary:hover {
            background: var(--gold);
            color: var(--bg-deep);
        }

        .connection-status {
            margin-top: 30px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold);
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--danger);
            animation: blink 2s infinite;
        }

        .status-dot.online {
            background: var(--success);
            animation: none;
        }

        .cached-pages {
            margin-top: 30px;
            text-align: right;
        }

        .cached-pages h3 {
            font-size: 18px;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .cached-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .cached-link {
            color: var(--text);
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 8px;
            background: var(--bg-card);
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .cached-link:hover {
            background: var(--gold);
            color: var(--bg-deep);
            transform: translateX(-5px);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @media (max-width: 768px) {
            .offline-container {
                padding: 10px;
            }
            
            .offline-title {
                font-size: 28px;
            }
            
            .offline-description {
                font-size: 16px;
            }
            
            .offline-actions {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="fas fa-wifi-slash"></i>
        </div>
        
        <h1 class="offline-title">غير متصل بالإنترنت</h1>
        
        <p class="offline-description">
            يبدو أنك غير متصل بالإنترنت حالياً. لا تقلق، يمكنك تصفح بعض الصفحات المحفوظة أو محاولة الاتصال مرة أخرى.
        </p>
        
        <div class="offline-actions">
            <button class="btn" onclick="retryConnection()">
                <i class="fas fa-sync"></i>
                إعادة المحاولة
            </button>
            <a href="/" class="btn btn-secondary">
                <i class="fas fa-home"></i>
                الصفحة الرئيسية
            </a>
        </div>
        
        <div class="connection-status">
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">جاري فحص الاتصال...</span>
            </div>
        </div>
        
        <div class="cached-pages">
            <h3>صفحات محفوظة</h3>
            <div class="cached-links">
                <a href="/" class="cached-link">
                    <i class="fas fa-home"></i>
                    الصفحة الرئيسية
                </a>
                <a href="/pages/wishlist.html" class="cached-link">
                    <i class="fas fa-heart"></i>
                    المفضلة
                </a>
                <a href="/pages/profile.html" class="cached-link">
                    <i class="fas fa-user"></i>
                    الملف الشخصي
                </a>
            </div>
        </div>
    </div>

    <script>
        // فحص حالة الاتصال
        let isOnline = navigator.onLine;
        let retryCount = 0;
        const maxRetries = 5;

        // تحديث حالة الاتصال
        function updateConnectionStatus() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            if (navigator.onLine) {
                statusDot.classList.add('online');
                statusText.textContent = 'متصل بالإنترنت';
            } else {
                statusDot.classList.remove('online');
                statusText.textContent = 'غير متصل بالإنترنت';
            }
        }

        // إعادة محاولة الاتصال
        async function retryConnection() {
            if (retryCount >= maxRetries) {
                alert('تم الوصول للحد الأقصى من محاولات الاتصال. يرجى المحاولة لاحقاً.');
                return;
            }

            retryCount++;
            const retryBtn = document.querySelector('.btn');
            const originalText = retryBtn.innerHTML;
            
            retryBtn.disabled = true;
            retryBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> جاري المحاولة (${retryCount}/${maxRetries})`;

            try {
                // محاولة الاتصال بخادم
                const response = await fetch('/api/health', {
                    method: 'GET',
                    cache: 'no-cache'
                });

                if (response.ok) {
                    // الاتصال نجح، إعادة التوجيه للصفحة الرئيسية
                    window.location.href = '/';
                } else {
                    throw new Error('Server not responding');
                }
            } catch (error) {
                console.error('Connection retry failed:', error);
                
                // إعادة المحاولة بعد 3 ثواني
                setTimeout(() => {
                    retryBtn.disabled = false;
                    retryBtn.innerHTML = originalText;
                }, 3000);
            }
        }

        // مراقبة حالة الاتصال
        window.addEventListener('online', () => {
            isOnline = true;
            updateConnectionStatus();
            
            // إعادة التوجيه للصفحة الرئيسية عند العودة للإنترنت
            setTimeout(() => {
                window.location.href = '/';
            }, 1000);
        });

        window.addEventListener('offline', () => {
            isOnline = false;
            updateConnectionStatus();
        });

        // فحص حالة الاتصال كل 5 ثواني
        setInterval(updateConnectionStatus, 5000);

        // التحقق من الصفحات المحفوظة
        async function checkCachedPages() {
            if ('caches' in window) {
                const cache = await caches.open('manahl-badr-v1');
                const keys = await cache.keys();
                
                if (keys.length > 0) {
                    console.log(`Found ${keys.length} cached pages`);
                }
            }
        }

        // تهيئة الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            updateConnectionStatus();
            checkCachedPages();
        });

        // اختصار لوحة المفاتيح
        document.addEventListener('keydown', (event) => {
            if (event.key === 'F5' || (event.ctrlKey && event.key === 'r')) {
                event.preventDefault();
                retryConnection();
            }
        });
    </script>
</body>
</html>
